    function makeTitle(text) {
      const clean = text.replace(/\n/g, " ").trim();
      if (clean.length <= 30) return clean;
      const cut = clean.substring(0, 30);
      const lastSpace = cut.lastIndexOf(" ");
      return (lastSpace > 15 ? cut.substring(0, lastSpace) : cut) + "...";
    }

    // Custom confirm modal (returns Promise<boolean>)
    function customConfirm({ title = "확인", message = "", okText = "확인", cancelText = "취소", icon = "⚠️", danger = true } = {}) {
      return new Promise((resolve) => {
        const modal = document.getElementById("confirmModal");
        document.getElementById("confirmTitle").textContent = title;
        document.getElementById("confirmMessage").innerHTML = message;
        document.getElementById("confirmIcon").textContent = icon;
        const okBtn = document.getElementById("confirmOk");
        const cancelBtn = document.getElementById("confirmCancel");
        okBtn.textContent = okText;
        cancelBtn.textContent = cancelText;
        okBtn.classList.toggle("danger", danger);
        modal.style.display = "";
        modal.classList.add("open");
        const cleanup = () => {
          modal.classList.remove("open");
          modal.style.display = "none";
          okBtn.onclick = null;
          cancelBtn.onclick = null;
          modal.onclick = null;
          document.removeEventListener("keydown", keyHandler);
        };
        const keyHandler = (e) => {
          if (e.key === "Escape") { cleanup(); resolve(false); }
          if (e.key === "Enter")  { cleanup(); resolve(true); }
        };
        okBtn.onclick = () => { cleanup(); resolve(true); };
        cancelBtn.onclick = () => { cleanup(); resolve(false); };
        modal.onclick = (e) => { if (e.target === modal) { cleanup(); resolve(false); } };
        document.addEventListener("keydown", keyHandler);
        setTimeout(() => okBtn.focus(), 50);
      });
    }

    async function deleteSession(id) {
      try {
        const res = await fetch("/api/sessions");
        const all = await res.json();
        const descendants = [];
        const collect = (pid) => {
          for (const s of all) if (s.parent_id === pid) { descendants.push(s); collect(s.id); }
        };
        collect(id);
        const target = all.find(s => s.id === id);
        const name = esc(target?.name || "세션");
        let ok;
        if (descendants.length > 0) {
          ok = await customConfirm({
            title: "세션 삭제",
            message: `<b>${name}</b>에 <b style="color:#a78bfa;">${descendants.length}개의 하위 분기</b>가 있습니다.<br>모두 함께 삭제하시겠습니까?`,
            okText: "모두 삭제",
            icon: "🗑️",
          });
        } else {
          ok = await customConfirm({
            title: "세션 삭제",
            message: `<b>${name}</b>을(를) 삭제하시겠습니까?<br>이 작업은 되돌릴 수 없습니다.`,
            okText: "삭제",
            icon: "🗑️",
          });
        }
        if (!ok) return;
        await fetch(`/api/sessions/${id}`, { method: "DELETE" });
        const deletedIds = new Set([id, ...descendants.map(s => s.id)]);
        // Split pane에서 삭제된 세션 제거
        for (const did of deletedIds) {
          const sp = splitPanes.find(p => p.sessionId === did);
          if (sp) removeSplitPane(sp.id);
        }
        if (deletedIds.has(currentSessionId)) {
          currentSessionId = null;
          clearMessages();
          setStreaming(false);
          // Find another session to auto-select
          const remaining = all.filter(s => !deletedIds.has(s.id));
          if (remaining.length > 0) {
            await loadSessions();
            switchSession(remaining[0].id);
            return;
          }
          // No sessions left — show input for new chat
          inputAreaEl.style.display = "";
        }
        await loadSessions();
      } catch (e) {
        console.error("[deleteSession]", e);
        // Ensure input is always usable after error
        setStreaming(false);
        inputAreaEl.style.display = "";
        await loadSessions().catch(() => {});
      }
    }

    function renameSession(id, btn) {
      const item = btn.closest(".session-item");
      const nameEl = item.querySelector(".name");
      const old = nameEl.textContent;
      nameEl.innerHTML = `<input class="session-edit" value="${esc(old)}" />`;
      const input = nameEl.querySelector("input");
      input.focus(); input.select();
      async function save() {
        const val = input.value.trim() || old;
        await fetch(`/api/sessions/${id}`, { method: "PATCH", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ name: val }) });
        loadSessions();
      }
      input.addEventListener("blur", save);
      input.addEventListener("keydown", e => { if (e.key === "Enter") save(); if (e.key === "Escape") loadSessions(); });
    }

    async function branchSession(id) {
      const res = await fetch(`/api/sessions/${id}/branch`, { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({}) });
      const s = await res.json();
      await loadSessions();
      switchSession(s.id);
    }

    async function switchSession(id) {
      currentSessionId = id;
      webSessionActive = true;
      setStreaming(false); // 즉시 입력 가능하게 초기화 (session_loaded에서 isRunning이면 다시 true)
      pendingFiles = []; renderAttachments(); // 세션 전환 시 첨부파일 초기화
      clearMessages();
      inputAreaEl.style.display = "";
      loadInputHistory(); // 세션별 입력 히스토리 로드
      // Tell server which session
      if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: "set_session", sessionId: id }));
      // Load messages
      const res = await fetch(`/api/sessions/${id}/messages`);
      const msgs = await res.json();
      for (const m of msgs) {
        if (m.role === "user") addUserMessage(m.content, null, m.id, true);
        else if (m.role === "assistant") {
          const tools = m.tool_data ? JSON.parse(m.tool_data) : [];
          const meta = m.meta ? JSON.parse(m.meta) : {};
          addSavedAssistant(m.content, tools, meta);
        }
      }
      // After history load, drop any spacer and scroll to the bottom.
      const sp = messagesEl.querySelector(".scroll-spacer");
      if (sp) sp.remove();
      requestAnimationFrame(() => { messagesEl.scrollTop = messagesEl.scrollHeight; });
      /* C gauge removed */
      loadSessions();
    }

    function renderSavedToolBlock(t) {
      let contentHtml = '';
      if (t.name === "Edit" && t.input) {
        const file = t.input.file_path ? `<div class="tool-file">${esc(t.input.file_path)}</div>` : "";
        let diff = '<div class="tool-diff">';
        if (t.input.old_string) t.input.old_string.split("\n").forEach(l => { diff += `<div class="tool-diff-line removed">- ${esc(l)}</div>`; });
        if (t.input.new_string) t.input.new_string.split("\n").forEach(l => { diff += `<div class="tool-diff-line added">+ ${esc(l)}</div>`; });
        diff += '</div>';
        if (t.result) diff += `<div class="tool-diff-line info">${esc(t.result)}</div>`;
        contentHtml = file + diff;
      } else if (t.name === "Bash" && t.input) {
        contentHtml = `<div class="tool-bash-cmd">${esc(t.input.command||"")}</div><div class="tool-bash-output">${esc(t.result||"")}</div>`;
      } else if (t.name === "Read" && t.input) {
        const file = t.input.file_path ? `<div class="tool-file">${esc(t.input.file_path)}</div>` : "";
        contentHtml = file + `<div class="tool-read-content">${esc((t.result||"").substring(0,2000))}</div>`;
      } else {
        contentHtml = `<div class="tool-json">${esc(t.result||"")}</div>`;
      }
      const desc = getToolDesc(t.name, t.input||{});
      return `<div class="tool-block"><div class="tool-header" onclick="this.parentElement.classList.toggle('open')"><span class="tool-chevron">&#9654;</span><span class="tool-name">${esc(t.name)}</span><span class="tool-desc">${esc(desc)}</span><span class="tool-status done">done</span></div><div class="tool-content">${contentHtml}</div></div>`;
    }

    function addSavedAssistant(text, tools, meta) {
      welcomeEl.style.display = "none";
      const div = document.createElement("div");
      div.className = "message assistant";
      let toolsHtml = '';
      if (tools.length > 0) {
        const counts = {};
        tools.forEach(t => counts[t.name] = (counts[t.name]||0)+1);
        const total = tools.length;
        const detail = Object.entries(counts).map(([k,v])=>`${k} x${v}`).join(", ");

        if (total > 3) {
          const innerBlocks = tools.map(t => renderSavedToolBlock(t)).join("");
          toolsHtml = `<div class="tools-summary"><div class="tools-summary-header" onclick="this.parentElement.classList.toggle('open')"><span class="ts-chevron">&#9654;</span><span class="ts-count">${total} tools used</span><span class="ts-detail">(${detail})</span></div><div class="tools-summary-body">${innerBlocks}</div></div>`;
        } else {
          toolsHtml = tools.map(t => renderSavedToolBlock(t)).join("");
        }
      }
      const textHtml = text ? `<div class="assistant-text">${marked.parse(text)}</div>` : '';
      let metaHtml = '';
      if (meta.duration || meta.cost) {
        const parts = [];
        if (meta.duration) parts.push(`${(meta.duration/1000).toFixed(1)}s`);
        if (meta.cost) parts.push(`$${meta.cost.toFixed(4)}`);
        metaHtml = `<div class="message-meta">${parts.join(" \u00b7 ")}</div>`;
      }
      div.innerHTML = `<div class="message-label">Claude</div><div class="message-body"><div class="tools-zone">${toolsHtml}</div>${textHtml}</div>${metaHtml}`;
      messagesEl.appendChild(div);
      scrollBottom();
    }

    // ── Chat helpers ──
    function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
    function scrollBottom() {
      // While a scroll-spacer exists, the user just sent a message and we want
      // to keep that message pinned at the top — do not auto-scroll.
      if (messagesEl.querySelector(".scroll-spacer")) return;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    function setConnected(ok) { statusDot.className = "status-dot"+(ok?" connected":""); sendBtn.disabled=!ok&&!isStreaming; }
    let streamTimer = null, streamStart = 0;
    function setStreaming(v) {
      isStreaming=v;
      sendIcon.style.display=v?"none":"block";
      stopIcon.style.display=v?"block":"none";
      sendBtn.className=v?"send-btn stop-btn":"send-btn";
      sendBtn.disabled=false;
      inputBox.disabled=v;
      inputBox.classList.toggle("streaming", v);
      if (v) {
        streamStart = Date.now();
        inputBox.placeholder = "Claude is responding... 0s";
        if (streamTimer) clearInterval(streamTimer);
        const fmt = s => s >= 60 ? `${Math.floor(s/60)}m ${s%60}s` : `${s}s`;
        streamTimer = setInterval(() => {
          const s = Math.floor((Date.now() - streamStart) / 1000);
          inputBox.placeholder = `Claude is responding... ${fmt(s)}`;
        }, 1000);
      } else {
        if (streamTimer) { clearInterval(streamTimer); streamTimer = null; }
        inputBox.placeholder = "Send a message...";
        inputBox.focus();
      }
    }

    function clearMessages() {
      messagesEl.innerHTML = "";
      messagesEl.appendChild(welcomeEl);
      welcomeEl.style.display = "flex";
      currentAssistantEl = null; currentAssistantBody = null; toolBlocks = {}; streamText = "";
    }

    function fmtTime(d) {
      const dt = d || new Date();
      const h = dt.getHours(), m = dt.getMinutes();
      const ampm = h >= 12 ? 'PM' : 'AM';
      return `${h % 12 || 12}:${String(m).padStart(2,'0')} ${ampm}`;
    }

    function addUserMessage(text, raw, msgId, fromHistory) {
      welcomeEl.style.display = "none";
      const div = document.createElement("div");
      div.className = "message user";
      if (msgId != null) div.dataset.msgId = msgId;
      const hasHtml = text.includes("<img") || text.includes("<span");
      const body = hasHtml ? text : esc(text).replace(/\n/g, "<br>");
      const restartBtn = msgId != null ? `<button class="msg-restart-btn" title="이 메시지 수정 후 다시 시작" onclick="beginEditMessage(${msgId}, this)">\u270e 수정 후 다시 시작</button>` : '';
      const LIMIT = 300;
      let bodyHtml;
      if (!hasHtml && text.length > LIMIT) {
        const previewText = text.slice(0, LIMIT);
        const preview = esc(previewText).replace(/\n/g, "<br>") + "...";
        bodyHtml = `<div class="message-body collapsible collapsed"><span class="msg-preview">${preview}</span><span class="msg-full">${body}</span><br><button class="msg-toggle" onclick="(function(b){var p=b.parentElement;p.classList.toggle('collapsed');b.textContent=p.classList.contains('collapsed')?'more':'less';})(this)">more</button></div>`;
      } else {
        bodyHtml = `<div class="message-body">${body}</div>`;
      }
      div.innerHTML = `<div class="message-label"><span class="user-badge">LOB</span><span class="msg-time">${fmtTime()}</span>${restartBtn}</div>${bodyHtml}`;
      const oldSpacer = messagesEl.querySelector(".scroll-spacer");
      if (oldSpacer) oldSpacer.remove();
      messagesEl.appendChild(div);
      if (fromHistory) return;
      const spacer = document.createElement("div");
      spacer.className = "scroll-spacer";
      spacer.style.flexShrink = "0";
      spacer.style.height = Math.max(0, messagesEl.clientHeight - 120) + "px";
      messagesEl.appendChild(spacer);
      requestAnimationFrame(() => {
        messagesEl.scrollTo({ top: div.offsetTop - messagesEl.clientHeight * 0.25, behavior: "smooth" });
      });
    }

    function beginEditMessage(msgId, btn) {
      if (isStreaming) { alert("응답 생성 중에는 수정할 수 없습니다."); return; }
      const msgEl = btn.closest(".message.user");
      if (!msgEl || msgEl.querySelector(".msg-edit-area")) return;
      const bodyEl = msgEl.querySelector(".message-body");
      const original = bodyEl.innerText;
      bodyEl.innerHTML = `<textarea class="msg-edit-area">${esc(original)}</textarea><div class="msg-edit-actions"><button class="msg-edit-save">저장 후 다시 시작</button><button class="msg-edit-cancel">취소</button></div>`;
      const ta = bodyEl.querySelector(".msg-edit-area");
      ta.style.height = Math.min(ta.scrollHeight + 4, 300) + "px";
      ta.focus();
      ta.setSelectionRange(ta.value.length, ta.value.length);
      bodyEl.querySelector(".msg-edit-cancel").onclick = () => {
        bodyEl.innerHTML = esc(original).replace(/\n/g, "<br>");
      };
      bodyEl.querySelector(".msg-edit-save").onclick = async () => {
        const newText = ta.value.trim();
        if (!newText) return;
        const res = await fetch(`/api/sessions/${currentSessionId}/messages/from/${msgId}`, { method: "DELETE" });
        if (!res.ok) {
          const body = await res.text().catch(()=>"");
          alert(`실패: HTTP ${res.status}\n${body.slice(0,200)}\n\n서버(server.js)를 재시작했는지 확인하세요.`);
          return;
        }
        // Reload the session (kills proc, clears claudeSessionId, re-renders truncated history)
        await switchSession(currentSessionId);
        // Send the edited message as a fresh turn
        inputBox.value = newText;
        inputBox.dispatchEvent(new Event("input"));
        sendMessage();
      };
    }
    window.beginEditMessage = beginEditMessage;

    let toolContainer = null;
    let toolCountMap = {};

    function ensureAssistantEl() {
      if (!currentAssistantEl) {
        welcomeEl.style.display = "none";
        const div = document.createElement("div");
        div.className = "message assistant";
        div.innerHTML = '<div class="message-label">Claude</div><div class="message-body"><div class="tools-zone"></div><div class="assistant-text"></div></div>';
        const spacer = messagesEl.querySelector(".scroll-spacer");
        if (spacer) messagesEl.insertBefore(div, spacer);
        else messagesEl.appendChild(div);
        currentAssistantEl = div;
        currentAssistantBody = div.querySelector(".message-body");
        toolContainer = div.querySelector(".tools-zone");
        toolCountMap = {};
      }
      return currentAssistantBody;
    }

    function basename(p) { return p ? p.split(/[/\\]/).pop() : ""; }

    function getToolDesc(name, input) {
      if (name==="Bash"&&input?.command) return input.description||input.command.substring(0,60);
      if (input?.file_path) return basename(input.file_path);
      if (input?.pattern) return input.pattern;
      return "";
    }

    function updateToolSummary() {
      if (!toolContainer) return;
      const total = Object.values(toolCountMap).reduce((a,b)=>a+b, 0);
      if (total <= 3) return; // show individual blocks for 3 or fewer
      let summary = toolContainer.querySelector(".tools-summary");
      if (!summary) {
        summary = document.createElement("div");
        summary.className = "tools-summary";
        summary.innerHTML = `<div class="tools-summary-header" onclick="this.parentElement.classList.toggle('open')"><span class="ts-chevron">&#9654;</span><span class="ts-count"></span><span class="ts-detail"></span></div><div class="tools-summary-body"></div>`;
        toolContainer.insertBefore(summary, toolContainer.firstChild);
      }
      const detail = Object.entries(toolCountMap).map(([k,v])=>`${k} x${v}`).join(", ");
      summary.querySelector(".ts-count").textContent = `${total} tools used`;
      summary.querySelector(".ts-detail").textContent = `(${detail})`;
      // Move all tool-blocks into summary body, EXCEPT the latest (running) one
      const body = summary.querySelector(".tools-summary-body");
      const blocks = Array.from(toolContainer.querySelectorAll(":scope > .tool-block"));
      blocks.slice(0, -1).forEach(tb => body.appendChild(tb));
    }

    function renderToolContent(toolName, input) {
      if (toolName === "Edit" && input) {
        const file = input.file_path ? `<div class="tool-file">${esc(input.file_path)}</div>` : "";
        let diff = '<div class="tool-diff">';
        if (input.old_string) {
          input.old_string.split("\n").forEach(l => { diff += `<div class="tool-diff-line removed">- ${esc(l)}</div>`; });
        }
        if (input.new_string) {
          input.new_string.split("\n").forEach(l => { diff += `<div class="tool-diff-line added">+ ${esc(l)}</div>`; });
        }
        diff += '</div>';
        return file + diff;
      }
      if (toolName === "Bash" && input) {
        return `<div class="tool-bash-cmd">${esc(input.command || "")}</div><div class="tool-bash-output" id="TOOL_OUTPUT"></div>`;
      }
      if ((toolName === "Read" || toolName === "Write") && input) {
        const file = input.file_path ? `<div class="tool-file">${esc(input.file_path)}</div>` : "";
        return file + `<div class="tool-read-content" id="TOOL_OUTPUT"></div>`;
      }
      return `<div class="tool-json">${esc(JSON.stringify(input, null, 2))}</div><div class="tool-json" id="TOOL_OUTPUT"></div>`;
    }

    function addToolBlock(toolId, toolName, input) {
      ensureAssistantEl();
      toolCountMap[toolName] = (toolCountMap[toolName] || 0) + 1;
      const div = document.createElement("div"); div.className = "tool-block"; div.id = "tool-"+toolId;
      const contentHtml = renderToolContent(toolName, input).replace(/id="TOOL_OUTPUT"/g, `id="tool-output-${toolId}"`);
      div.innerHTML = `<div class="tool-header" onclick="this.parentElement.classList.toggle('open')"><span class="tool-chevron">&#9654;</span><span class="tool-name">${esc(toolName)}</span><span class="tool-desc">${esc(getToolDesc(toolName,input))}</span><span class="tool-status running">running...</span></div><div class="tool-content">${contentHtml}</div>`;
      // Collapse previous tool blocks, auto-open the latest (running) one
      toolContainer.querySelectorAll(":scope > .tool-block.open").forEach(el => el.classList.remove("open"));
      div.classList.add("open");
      toolContainer.appendChild(div); toolBlocks[toolId] = div;
      updateToolSummary();
      scrollBottom();
    }

    function updateToolResult(toolId, content, isError) {
      const div = toolBlocks[toolId]; if(!div) return;
      const s=div.querySelector(".tool-status"); const o=div.querySelector(`#tool-output-${toolId}`);
      if(s){s.textContent=isError?"error":"done";s.className="tool-status "+(isError?"error":"done");}
      if(!isError) div.classList.remove("open");
      if(o){
        const text = (content||"").substring(0,3000)||"(no output)";
        o.textContent = text;
        if(isError) o.style.color = "#ef4444";
      }
    }

    function appendText(text) {
      streamText += text;
      ensureAssistantEl();
      const el = currentAssistantBody.querySelector(".assistant-text");
      if (el) el.innerHTML = marked.parse(streamText);
      scrollBottom();
    }

    function finalizeAssistant(meta) {
      if (meta && currentAssistantEl) {
        const d = document.createElement("div"); d.className = "message-meta";
        const p = []; if(meta.duration)p.push(`${(meta.duration/1000).toFixed(1)}s`); if(meta.cost)p.push(`$${meta.cost.toFixed(4)}`);
        d.textContent = p.join(" \u00b7 "); currentAssistantEl.appendChild(d);
      }
      currentAssistantEl = null; currentAssistantBody = null; toolBlocks = {}; toolContainer = null; toolCountMap = {};
    }

    // ── Slash commands ──
    function showSlashMenu(f) { const q=f.toLowerCase(); const m=slashCommands.filter(c=>c.name.startsWith(q)); if(!m.length){hideSlashMenu();return;} slashMenu.innerHTML=m.map((c,i)=>`<div class="slash-item${i===slashActive?' active':''}" data-name="${c.name}"><span class="slash-item-name">${c.name}</span><span class="slash-item-desc">${c.desc}</span></div>`).join(""); slashMenu.classList.add("open"); slashMenu.querySelectorAll(".slash-item").forEach(el=>{el.addEventListener("click",()=>{inputBox.value=el.dataset.name;hideSlashMenu();inputBox.focus();})}); }
    function hideSlashMenu() { slashMenu.classList.remove("open"); slashActive=-1; }
    function navigateSlashMenu(d) { const items=slashMenu.querySelectorAll(".slash-item"); if(!items.length)return; items.forEach(e=>e.classList.remove("active")); slashActive=(slashActive+d+items.length)%items.length; items[slashActive].classList.add("active"); }
    function selectSlashItem() { const items=slashMenu.querySelectorAll(".slash-item"); if(slashActive>=0&&slashActive<items.length){inputBox.value=items[slashActive].dataset.name;hideSlashMenu();return true;} return false; }

    function handleSlashCommand(text) {
      if (text === "/clear") {
        if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: "clear" }));
        clearMessages(); webSessionActive = true; /* C gauge removed */
        return true;
      }
      if (text === "/branch") {
        if (currentSessionId) branchSession(currentSessionId);
        return true;
      }
      if (text === "/help") {
        welcomeEl.style.display = "none";
        const div = document.createElement("div"); div.className = "message assistant";
        div.innerHTML = '<div class="message-label">System</div><div class="message-body">' + slashCommands.map(c=>`<code>${c.name}</code> — ${c.desc}`).join("<br>") + '</div>';
        messagesEl.appendChild(div); scrollBottom();
        return true;
      }
      return false;
    }

    // ── Send ──
    function sendMessage() {
      if (isStreaming) { ws.send(JSON.stringify({ type: "stop" })); return; }
      const text = inputBox.value.trim();
      if (!text || !ws || ws.readyState !== 1) return;
      hideSlashMenu();
      pushHistory(text);
      if (text.startsWith("/") && handleSlashCommand(text)) { inputBox.value = ""; inputBox.style.height = "48px"; return; }

      inputBox.value = ""; inputBox.style.height = "48px";

      // Create session with selected folder then send
      if (!currentSessionId) {
        const cwd = pendingCwd || serverHome || "/";
        pendingCwd = null;
        fetch("/api/sessions", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ name: makeTitle(text), cwd }) })
          .then(r => r.json()).then(s => { currentSessionId = s.id; if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:"set_session",sessionId:s.id})); loadSessions(); doSend(text); });
        return;
      }
      doSend(text);
    }

    function doSend(text) {
      // Append file paths to message
      let fullText = text;
      if (pendingFiles.length > 0) {
        const filePaths = pendingFiles.map(f => f.path).join("\n");
        fullText = text + "\n\n[Attached files]\n" + filePaths;
        // Show attachments in user message
        const imgHtml = pendingFiles.filter(f=>f.previewUrl).map(f=>`<img src="${f.previewUrl}" style="max-width:200px;max-height:150px;border-radius:8px;margin-top:8px;">`).join(" ");
        const fileHtml = pendingFiles.filter(f=>!f.previewUrl).map(f=>`<span style="display:inline-block;padding:4px 8px;background:var(--surface2);border-radius:4px;font-size:12px;margin-top:4px;">&#128196; ${esc(f.name)}</span>`).join(" ");
        addUserMessage(text + (imgHtml || fileHtml ? "<br>" + imgHtml + fileHtml : ""));
      } else {
        addUserMessage(text);
      }
      pendingFiles = [];
      renderAttachments();
      streamText = ""; setStreaming(true);
      ws.send(JSON.stringify({ type: "chat", text: fullText }));
    }

    // ── WebSocket ──
    function connect() {
      const proto = location.protocol==="https:"?"wss:":"ws:";
      ws = new WebSocket(`${proto}//${location.host}`);
      ws.onopen = () => { setConnected(true); if(currentSessionId) ws.send(JSON.stringify({type:"set_session",sessionId:currentSessionId})); };
      ws.onclose = () => { setConnected(false); setTimeout(connect, 3000); };
      ws.onerror = () => setConnected(false);
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);

        // 실행 중인 세션 목록 갱신 — 사이드바 ● 표시 업데이트
        if (msg.type === "running_sessions") {
          runningSessionIds = new Set(msg.sessions);
          loadSessions();
          return;
        }

        // Split pane으로 라우팅: 해당 세션이 split에 열려 있으면 거기로 전달
        const sessionedTypes = ["text","tool_use","tool_result","done","error","stopped","process_ended","user_msg_id","partial_replay"];
        if (msg.sessionId && sessionedTypes.includes(msg.type) && splitPanes.find(p => p.sessionId === msg.sessionId)) {
          if (handleSplitPaneMessage(msg)) {
            if (msg.type === "done" || msg.type === "stopped" || msg.type === "process_ended") {
              runningSessionIds.delete(msg.sessionId);
              loadSessions();
            }
            return;
          }
        }

        // 백그라운드 세션에서 온 이벤트: 화면에 렌더링하지 않고 상태만 갱신
        if (msg.sessionId && sessionedTypes.includes(msg.type) && msg.sessionId !== currentSessionId) {
          if (msg.type === "done" || msg.type === "stopped" || msg.type === "process_ended") {
            runningSessionIds.delete(msg.sessionId);
            loadSessions(); // 사이드바 ● 제거
          }
          return; // 현재 화면에 보이지 않는 세션이므로 렌더링 스킵
        }

        if (msg.type==="init") { /* model shown in status bar */ }

        if (msg.type==="user_msg_id") {
          const userMsgs = messagesEl.querySelectorAll(".message.user");
          const lastUser = userMsgs[userMsgs.length - 1];
          if (lastUser && !lastUser.dataset.msgId) {
            lastUser.dataset.msgId = msg.msgId;
            const label = lastUser.querySelector(".message-label");
            if (label && !label.querySelector(".msg-restart-btn")) {
              label.insertAdjacentHTML("beforeend", `<button class="msg-restart-btn" title="이 메시지 수정 후 다시 시작" onclick="beginEditMessage(${msg.msgId}, this)">\u270e 수정 후 다시 시작</button>`);
            }
          }
        }

        if (msg.type==="session_loaded") {
          // 빠른 세션 전환 시 이전 set_session의 응답이 늦게 올 수 있으므로 sessionId 체크
          if (msg.sessionId && msg.sessionId !== currentSessionId) return;
          webSessionActive=true;
          // isRunning일 때만 streaming 활성화
          // setStreaming(false)는 switchSession() 진입 시 이미 처리되며,
          // doSend() 직후 isRunning:false로 덮어쓰는 문제를 방지하기 위해 여기서 false 호출 안 함
          if (msg.isRunning) setStreaming(true);
        }

        // 백그라운드에서 실행 중이던 세션으로 돌아올 때 진행 내용 복원
        if (msg.type==="partial_replay") {
          if (msg.text) appendText(msg.text);
          for (const t of (msg.tools || [])) {
            addToolBlock(t.id, t.name, t.input);
            if (t.result !== undefined) updateToolResult(t.id, t.result, false);
          }
          setStreaming(true);
          return;
        }

        if (msg.type==="text") appendText(msg.text);
        if (msg.type==="tool_use") addToolBlock(msg.toolId, msg.toolName, msg.input);
        if (msg.type==="tool_result") updateToolResult(msg.toolId, msg.content, msg.isError);
        if (msg.type==="done") {
          if(streamText===""&&msg.text)appendText(msg.text);
          finalizeAssistant({duration:msg.duration,cost:msg.cost});
          if(msg.sPct!=null){updateGauge("S",msg.sPct);document.getElementById("timeS").textContent=formatRemaining(msg.sResetsAt);}
          if(msg.wPct!=null){updateGauge("W",msg.wPct);document.getElementById("timeW").textContent=formatRemaining(msg.wResetsAt);}
          pollStatus(); streamText=""; setStreaming(false);
          runningSessionIds.delete(currentSessionId);
          loadSessions();
        }
        if (msg.type==="error") { ensureAssistantEl().innerHTML+=`<div style="color:#ef4444;">${esc(msg.text)}</div>`; setStreaming(false); }
        if (msg.type==="cleared") { webSessionActive=true; }
        if (msg.type==="stopped"||msg.type==="process_ended") {
          if(!isStreaming)return;
          if(streamText==="")appendText("(stopped)");
          finalizeAssistant(null); streamText=""; setStreaming(false);
          runningSessionIds.delete(currentSessionId);
          loadSessions();
        }
      };
    }

    // ── File attachments ──
    let pendingFiles = []; // { path, name, type, previewUrl }
    const attachmentsEl = document.getElementById("attachments");
    const inputAreaEl = document.getElementById("inputArea");

    function renderAttachments() {
      attachmentsEl.innerHTML = pendingFiles.map((f, i) => {
        const isImg = f.type?.startsWith("image/");
        const thumb = isImg
          ? `<img class="attach-thumb" src="${f.previewUrl}" />`
          : `<div class="attach-file-icon">&#128196;</div>`;
        return `<div class="attach-item">${thumb}<span class="attach-name">${esc(f.name)}</span><button class="attach-remove" onclick="removeAttach(${i})">x</button></div>`;
      }).join("");
      sendBtn.disabled = !inputBox.value.trim() && pendingFiles.length === 0 && !isStreaming;
    }

    function removeAttach(idx) {
      pendingFiles.splice(idx, 1);
      renderAttachments();
    }

    async function uploadFile(file) {
      const form = new FormData();
      form.append("file", file);
      const res = await fetch("/api/upload", { method: "POST", body: form });
      return await res.json();
    }

    async function addFiles(files) {
      for (const file of files) {
        const result = await uploadFile(file);
        const isImg = file.type?.startsWith("image/");
        pendingFiles.push({
          path: result.path,
          name: result.name,
          type: file.type,
          previewUrl: isImg ? `/uploads/${basename(result.path)}` : null,
        });
      }
      renderAttachments();
    }

    // File input button
    document.getElementById("fileInput").addEventListener("change", (e) => {
      if (e.target.files.length) addFiles(e.target.files);
      e.target.value = ""; // reset so same file can be re-selected
    });

    // Drag & Drop
    inputAreaEl.addEventListener("dragover", (e) => { e.preventDefault(); inputAreaEl.classList.add("dragover"); });
    inputAreaEl.addEventListener("dragleave", () => { inputAreaEl.classList.remove("dragover"); });
    inputAreaEl.addEventListener("drop", (e) => {
      e.preventDefault();
      inputAreaEl.classList.remove("dragover");
      if (e.dataTransfer.files.length) addFiles(e.dataTransfer.files);
    });

    // Paste (images)
    inputBox.addEventListener("paste", (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      const files = [];
      for (const item of items) {
        if (item.kind === "file") {
          files.push(item.getAsFile());
        }
      }
      if (files.length) {
        e.preventDefault();
        addFiles(files);
      }
    });

    // ── Events ──
    let isComposing = false;
    inputBox.addEventListener("compositionstart", () => { isComposing = true; });
    inputBox.addEventListener("compositionend", () => { isComposing = false; });

    sendBtn.addEventListener("click", sendMessage);
    // ── Input history (arrow key navigation when input is empty) ──
    // 세션별로 독립 관리: localStorage key = "input_history_<sessionId>"
    function historyKey() { return currentSessionId ? `input_history_${currentSessionId}` : "input_history"; }
    let inputHistory = [];
    let historyIndex = -1; // -1 = not browsing
    let historyDraft = ""; // stash current draft when browsing
    function loadInputHistory() {
      inputHistory = JSON.parse(localStorage.getItem(historyKey()) || "[]");
      historyIndex = -1;
      historyDraft = "";
    }
    loadInputHistory();
    function pushHistory(text) {
      if (!text || !text.trim()) return;
      // De-dupe: if same as last, skip
      if (inputHistory[inputHistory.length - 1] === text) return;
      inputHistory.push(text);
      if (inputHistory.length > 100) inputHistory.shift();
      localStorage.setItem(historyKey(), JSON.stringify(inputHistory));
      historyIndex = -1;
    }
    function loadHistoryAt(idx) {
      inputBox.value = inputHistory[idx] || "";
      // Trigger resize
      inputBox.dispatchEvent(new Event("input"));
      // Move cursor to end
      setTimeout(() => { inputBox.selectionStart = inputBox.selectionEnd = inputBox.value.length; }, 0);
    }

    inputBox.addEventListener("keydown", (e) => {
      if (isComposing) return;
      const mo = slashMenu.classList.contains("open");
      if(mo&&e.key==="ArrowDown"){e.preventDefault();navigateSlashMenu(1);return;}
      if(mo&&e.key==="ArrowUp"){e.preventDefault();navigateSlashMenu(-1);return;}
      if(mo&&(e.key==="Tab"||e.key==="Enter")&&slashActive>=0){e.preventDefault();selectSlashItem();return;}
      if(e.key==="Escape"){
        if(historyIndex !== -1){ historyIndex = -1; inputBox.value = historyDraft; inputBox.dispatchEvent(new Event("input")); return; }
        hideSlashMenu();return;
      }
      // Arrow key history: only when empty or already browsing history
      if (e.key === "ArrowUp" && inputHistory.length > 0) {
        const isEmpty = inputBox.value.trim() === "";
        if (isEmpty || historyIndex !== -1) {
          e.preventDefault();
          if (historyIndex === -1) { historyDraft = inputBox.value; historyIndex = inputHistory.length; }
          if (historyIndex > 0) { historyIndex--; loadHistoryAt(historyIndex); }
          return;
        }
      }
      if (e.key === "ArrowDown" && historyIndex !== -1) {
        e.preventDefault();
        if (historyIndex < inputHistory.length - 1) {
          historyIndex++;
          loadHistoryAt(historyIndex);
        } else {
          // At end of history: restore draft
          historyIndex = -1;
          inputBox.value = historyDraft;
          inputBox.dispatchEvent(new Event("input"));
        }
        return;
      }
      if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}
    });
    inputBox.addEventListener("input", () => {
      inputBox.style.height="48px"; const sh=Math.min(inputBox.scrollHeight,200); inputBox.style.height=sh+"px"; inputBox.style.overflowY=inputBox.scrollHeight>200?"auto":"hidden";
      sendBtn.disabled=!inputBox.value.trim()&&pendingFiles.length===0&&!isStreaming;
      const v=inputBox.value; if(v.startsWith("/")&&!v.includes(" "))showSlashMenu(v); else hideSlashMenu();
    });

    // ── Sidebar toggle ──
    async function restartServer() {
      const btn = document.getElementById("serverToggle");
      if (btn.classList.contains("restarting")) return;
      btn.classList.remove("on","off");
      btn.classList.add("restarting");
      btn.title = "재시작 중...";
      try { await fetch("/api/server/restart", { method: "POST" }); } catch {}
      // Wait for server to come back
      const waitForServer = () => {
        const check = setInterval(async () => {
          try {
            const r = await fetch("/api/home", { signal: AbortSignal.timeout(1500) });
            if (r.ok) {
              clearInterval(check);
              btn.classList.remove("restarting","off");
              btn.classList.add("on");
              btn.title = "서버 재시작";
              location.reload();
            }
          } catch {}
        }, 800);
        // Timeout after 15s
        setTimeout(() => {
          clearInterval(check);
          if (btn.classList.contains("restarting")) {
            btn.classList.remove("restarting");
            btn.classList.add("off");
            btn.title = "서버 연결 실패 — 클릭하여 재시도";
          }
        }, 15000);
      };
      setTimeout(waitForServer, 500);
    }

    // ── Storage bar ──
    let storageData = null;

    function fmtBytes(b) {
      if (b >= 1024 * 1024 * 1024) return (b / (1024 * 1024 * 1024)).toFixed(1) + " GB";
      if (b >= 1024 * 1024) return (b / (1024 * 1024)).toFixed(1) + " MB";
      if (b >= 1024) return (b / 1024).toFixed(1) + " KB";
      return b + " B";
    }

    async function loadStorageInfo() {
      try {
        const res = await fetch("/api/storage-info");
        storageData = await res.json();
        const totalEl = document.getElementById("storageTotalSize");
        totalEl.textContent = fmtBytes(storageData.total);

        const tooltip = document.getElementById("storageTooltip");
        const dirs = storageData.dirs || [];
        const top9 = dirs.slice(0, 9);
        const rest = dirs.slice(9);
        const restBytes = rest.reduce((s, d) => s + d.bytes, 0);

        let html = '<div class="storage-tooltip-title">~/.claude/projects/</div>';
        if (dirs.length === 0) {
          html += '<div style="color:var(--text-muted);font-size:11px;">비어있음</div>';
        } else {
          for (const d of top9) {
            const displayName = d.name.replace(/^-/, "").replace(/-/g, "/");
            html += `<div class="storage-tooltip-item">
              <span class="storage-tooltip-name" title="${displayName}">${displayName || d.name}</span>
              <span class="storage-tooltip-size">${fmtBytes(d.bytes)}</span>
            </div>`;
          }
          if (rest.length > 0) {
            html += `<div class="storage-tooltip-item other">
              <span class="storage-tooltip-name">기타 ${rest.length}개</span>
              <span class="storage-tooltip-size">${fmtBytes(restBytes)}</span>
            </div>`;
          }
        }
        tooltip.innerHTML = html;
      } catch {}
    }

    document.getElementById("storageTrashBtn").addEventListener("click", async () => {
      const total = storageData ? fmtBytes(storageData.total) : "?";
      if (!confirm(`Claude 세션 파일 ${total}를 삭제하시겠습니까?\n(현재 실행 중인 세션은 보호됩니다)`)) return;
      const btn = document.getElementById("storageTrashBtn");
      btn.disabled = true;
      try {
        const res = await fetch("/api/storage-clear", { method: "POST" });
        const data = await res.json();
        if (data.ok) {
          await loadStorageInfo();
        }
      } catch (e) {
        alert("삭제 실패: " + e.message);
      } finally {
        btn.disabled = false;
      }
    });

    // Initial load + 1분마다 갱신
    loadStorageInfo();
    setInterval(loadStorageInfo, 60000);

    function toggleSidebar() {
      const sb = document.getElementById("sidebar");
      const collapsed = !sb.classList.contains("collapsed");
      sb.classList.toggle("collapsed", collapsed);
      localStorage.setItem("sidebar_collapsed", collapsed ? "1" : "0");
    }

    if (localStorage.getItem("sidebar_collapsed") === "1") {
      document.getElementById("sidebar").classList.add("collapsed");
    }

    // ── Buddy animation (exact frames from Claude Code CLI) ──
    (function initBuddies() {
      const EYE = "•";
      // Each buddy has 3 frames; {E} gets replaced with eye char
      const BUDDIES = {
        owl: [
          ["            ","   /\\  /\\   ","  (({E})({E}))  ","  (  ><  )  ","   `----´   "],
          ["            ","   /\\  /\\   ","  (({E})({E}))  ","  (  ><  )  ","   .----.   "],
          ["            ","   /\\  /\\   ","  (({E})(-))  ","  (  ><  )  ","   `----´   "],
        ],
        capybara: [
          ["            ","  n______n  "," ( {E}    {E} ) "," (   oo   ) ","  `------´  "],
          ["            ","  n______n  "," ( {E}    {E} ) "," (   Oo   ) ","  `------´  "],
          ["    ~  ~    ","  u______n  "," ( {E}    {E} ) "," (   oo   ) ","  `------´  "],
        ],
        cat: [
          ["            ","   /\\_/\\    ","  ( {E}   {E})  ","  (  ω  )   ",'  (")_(")   '],
          ["            ","   /\\_/\\    ","  ( {E}   {E})  ","  (  ω  )   ",'  (")_(")~  '],
          ["            ","   /\\-/\\    ","  ( {E}   {E})  ","  (  ω  )   ",'  (")_(")   '],
        ],
      };
      const elements = {
        owl: document.getElementById("buddyOwl"),
        capybara: document.getElementById("buddyCapy"),
        cat: document.getElementById("buddyCat"),
      };
      const frameIdx = { owl: 0, capybara: 0, cat: 0 };
      function render(name) {
        if (!elements[name]) return;
        const frames = BUDDIES[name];
        const frame = frames[frameIdx[name] % frames.length];
        elements[name].textContent = frame.map(line => line.replaceAll("{E}", EYE)).join("\n");
      }
      // Initial render
      Object.keys(BUDDIES).forEach(render);
      // Advance frames on staggered intervals
      setInterval(() => { frameIdx.capybara++; render("capybara"); }, 700);
      setInterval(() => { frameIdx.owl++;      render("owl");      }, 900);
      setInterval(() => { frameIdx.cat++;      render("cat");      }, 800);
    })();

    // ── Split View ──
    const splitContainer = document.getElementById("splitContainer");
    const mainEl = document.querySelector(".main");
    let splitPanes = []; // { id, sessionId, el }
    let splitDirection = localStorage.getItem("split_direction") || "horizontal"; // "horizontal" or "vertical"

    function setSplitDirection(dir) {
      splitDirection = dir;
      localStorage.setItem("split_direction", dir);
      splitContainer.className = `split-container ${dir}`;
      // Update direction button states in all panes
      splitContainer.querySelectorAll('.split-dir-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.dir === dir);
      });
    }

    function addSplitPane(sessionId) {
      // Prevent duplicates
      if (splitPanes.find(p => p.sessionId === sessionId)) return;

      const paneId = 'pane-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);
      const s = allSessionsCache.find(x => x.id === sessionId);
      const name = s ? s.name : sessionId;

      const pane = document.createElement('div');
      pane.className = 'split-pane';
      pane.id = paneId;
      pane.innerHTML = `
        <div class="pane-header">
          <span class="pane-title" title="${esc(name)}">${esc(name)}</span>
          <div class="split-btn-group">
            <button class="split-dir-btn${splitDirection==='horizontal'?' active':''}" data-dir="horizontal" onclick="setSplitDirection('horizontal')" title="좌우 분할">◫</button>
            <button class="split-dir-btn${splitDirection==='vertical'?' active':''}" data-dir="vertical" onclick="setSplitDirection('vertical')" title="상하 분할">⬒</button>
          </div>
          <button onclick="removeSplitPane('${paneId}')" title="닫기">✕</button>
        </div>
        <div class="pane-messages" id="${paneId}-msgs"></div>
        <div class="pane-input-area" id="${paneId}-inputArea">
          <div class="pane-attachments" id="${paneId}-attachments"></div>
          <div class="pane-status-bar">
            <span class="perm-indicator" id="${paneId}-perm" onclick="cyclePermMode()">${currentPermMode ? 'mode: ' + currentPermMode : 'acceptEdits'}</span>
            <span class="status-right"><span class="model-select ${currentModel === 'opus' ? 'expensive' : 'normal'}" id="${paneId}-model" onclick="cycleModel()">${currentModel || 'sonnet'}</span> <span class="status-dot${ws && ws.readyState === 1 ? ' connected' : ''}" id="${paneId}-dot"></span></span>
          </div>
          <div class="pane-input-wrapper">
            <input type="file" id="${paneId}-fileInput" multiple hidden />
            <button class="attach-btn" onclick="document.getElementById('${paneId}-fileInput').click()" title="Attach file">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <button class="attach-btn perm-btn" onclick="cyclePermMode()" title="Permission mode">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            </button>
            <textarea class="input-box" id="${paneId}-input" placeholder="Send a message..." rows="1"></textarea>
            <button class="send-btn" id="${paneId}-send" disabled>
              <svg class="pane-send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
              <svg class="pane-stop-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><rect x="6" y="6" width="12" height="12" rx="2"></rect></svg>
            </button>
          </div>
        </div>
      `;

      // Add resizer if not the first pane
      if (splitPanes.length > 0) {
        const resizer = document.createElement('div');
        resizer.className = 'split-resizer';
        resizer.dataset.paneId = paneId;
        splitContainer.appendChild(resizer);
        initResizer(resizer);
      }

      splitContainer.appendChild(pane);
      const paneData = { id: paneId, sessionId, el: pane, streaming: false, streamText: '', currentAssistantEl: null, streamTimer: null, streamStart: 0, pendingFiles: [] };
      splitPanes.push(paneData);

      // Wire up input — identical behavior to main input
      const inputEl = document.getElementById(`${paneId}-input`);
      const sendBtnEl = document.getElementById(`${paneId}-send`);
      const fileInputEl = document.getElementById(`${paneId}-fileInput`);

      inputEl.addEventListener('input', () => {
        inputEl.style.height = '48px';
        const sh = Math.min(inputEl.scrollHeight, 200);
        inputEl.style.height = sh + 'px';
        inputEl.style.overflowY = inputEl.scrollHeight > 200 ? 'auto' : 'hidden';
        sendBtnEl.disabled = !inputEl.value.trim() && paneData.pendingFiles.length === 0 && !paneData.streaming;
      });

      let paneComposing = false;
      inputEl.addEventListener('compositionstart', () => { paneComposing = true; });
      inputEl.addEventListener('compositionend', () => { paneComposing = false; });

      inputEl.addEventListener('keydown', (e) => {
        if (paneComposing) return;
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); paneSend(paneId); }
      });

      sendBtnEl.addEventListener('click', () => paneSend(paneId));

      // File attach
      fileInputEl.addEventListener('change', async (e) => {
        if (e.target.files.length) await addPaneFiles(paneId, e.target.files);
        e.target.value = '';
      });

      // Drag & drop
      const inputAreaEl = document.getElementById(`${paneId}-inputArea`);
      inputAreaEl.addEventListener('dragover', (e) => { e.preventDefault(); inputAreaEl.classList.add('dragover'); });
      inputAreaEl.addEventListener('dragleave', () => { inputAreaEl.classList.remove('dragover'); });
      inputAreaEl.addEventListener('drop', async (e) => {
        e.preventDefault(); inputAreaEl.classList.remove('dragover');
        if (e.dataTransfer.files.length) await addPaneFiles(paneId, e.dataTransfer.files);
      });

      // Paste images
      inputEl.addEventListener('paste', (e) => {
        const items = e.clipboardData?.items;
        if (!items) return;
        const files = [];
        for (const item of items) { if (item.kind === 'file') files.push(item.getAsFile()); }
        if (files.length) { e.preventDefault(); addPaneFiles(paneId, files); }
      });

      // Activate split mode
      mainEl.classList.add('split-active');
      splitContainer.style.display = 'flex';
      splitContainer.className = `split-container ${splitDirection}`;

      // Load messages into pane
      loadPaneMessages(paneId, sessionId);
      inputEl.focus();
    }

    async function addPaneFiles(paneId, files) {
      const paneData = splitPanes.find(p => p.id === paneId);
      if (!paneData) return;
      for (const file of files) {
        const result = await uploadFile(file);
        const isImg = file.type?.startsWith('image/');
        paneData.pendingFiles.push({
          path: result.path, name: result.name, type: file.type,
          previewUrl: isImg ? `/uploads/${basename(result.path)}` : null,
        });
      }
      renderPaneAttachments(paneId);
    }

    function renderPaneAttachments(paneId) {
      const paneData = splitPanes.find(p => p.id === paneId);
      if (!paneData) return;
      const el = document.getElementById(`${paneId}-attachments`);
      if (!el) return;
      el.innerHTML = paneData.pendingFiles.map((f, i) => {
        const isImg = f.type?.startsWith('image/');
        const thumb = isImg ? `<img class="attach-thumb" src="${f.previewUrl}" />` : `<div class="attach-file-icon">&#128196;</div>`;
        return `<div class="attach-item">${thumb}<span class="attach-name">${esc(f.name)}</span><button class="attach-remove" onclick="removePaneAttach('${paneId}',${i})">x</button></div>`;
      }).join('');
      const sendBtnEl = document.getElementById(`${paneId}-send`);
      const inputEl = document.getElementById(`${paneId}-input`);
      if (sendBtnEl) sendBtnEl.disabled = !inputEl.value.trim() && paneData.pendingFiles.length === 0 && !paneData.streaming;
    }

    function removePaneAttach(paneId, idx) {
      const paneData = splitPanes.find(p => p.id === paneId);
      if (!paneData) return;
      paneData.pendingFiles.splice(idx, 1);
      renderPaneAttachments(paneId);
    }

    function paneSend(paneId) {
      const paneData = splitPanes.find(p => p.id === paneId);
      if (!paneData) return;
      const inputEl = document.getElementById(`${paneId}-input`);

      // If streaming, send stop
      if (paneData.streaming) {
        if (ws && ws.readyState === 1) {
          ws.send(JSON.stringify({ type: "set_session", sessionId: paneData.sessionId }));
          ws.send(JSON.stringify({ type: "stop" }));
          if (currentSessionId) setTimeout(() => ws.send(JSON.stringify({ type: "set_session", sessionId: currentSessionId })), 100);
        }
        return;
      }

      const text = inputEl.value.trim();
      if (!text && paneData.pendingFiles.length === 0) return;
      if (!ws || ws.readyState !== 1) return;

      // Build full text with attachments
      let fullText = text;
      const msgsEl = document.getElementById(`${paneId}-msgs`);
      if (paneData.pendingFiles.length > 0) {
        const filePaths = paneData.pendingFiles.map(f => f.path).join('\n');
        fullText = text + '\n\n[Attached files]\n' + filePaths;
        const imgHtml = paneData.pendingFiles.filter(f=>f.previewUrl).map(f=>`<img src="${f.previewUrl}" style="max-width:200px;max-height:150px;border-radius:8px;margin-top:8px;">`).join(' ');
        const fileHtml = paneData.pendingFiles.filter(f=>!f.previewUrl).map(f=>`<span style="display:inline-block;padding:4px 8px;background:var(--surface2);border-radius:4px;font-size:12px;margin-top:4px;">&#128196; ${esc(f.name)}</span>`).join(' ');
        msgsEl.insertAdjacentHTML('beforeend', `<div class="message user"><div class="message-label"><span class="user-badge">LOB</span><span class="msg-time">${fmtTime()}</span></div><div class="message-body">${esc(text).replace(/\n/g,'<br>')}${imgHtml||fileHtml ? '<br>'+imgHtml+fileHtml : ''}</div></div>`);
      } else {
        msgsEl.insertAdjacentHTML('beforeend', `<div class="message user"><div class="message-label"><span class="user-badge">LOB</span><span class="msg-time">${fmtTime()}</span></div><div class="message-body">${esc(text).replace(/\n/g,'<br>')}</div></div>`);
      }
      msgsEl.scrollTop = msgsEl.scrollHeight;

      paneData.pendingFiles = [];
      renderPaneAttachments(paneId);
      inputEl.value = '';
      inputEl.style.height = '48px';
      paneData.streaming = true;
      paneData.streamText = '';
      paneData.currentAssistantEl = null;
      setPaneStreaming(paneId, true);

      // Send via WS: set_session → chat → restore main session
      ws.send(JSON.stringify({ type: "set_session", sessionId: paneData.sessionId }));
      ws.send(JSON.stringify({ type: "chat", text: fullText }));
      if (currentSessionId && currentSessionId !== paneData.sessionId) {
        setTimeout(() => ws.send(JSON.stringify({ type: "set_session", sessionId: currentSessionId })), 200);
      }
    }

    function setPaneStreaming(paneId, v) {
      const paneData = splitPanes.find(p => p.id === paneId);
      if (!paneData) return;
      paneData.streaming = v;
      const inputEl = document.getElementById(`${paneId}-input`);
      const sendBtnEl = document.getElementById(`${paneId}-send`);
      const sendIcon = paneData.el.querySelector('.pane-send-icon');
      const stopIcon = paneData.el.querySelector('.pane-stop-icon');

      if (inputEl) {
        inputEl.disabled = v;
        inputEl.classList.toggle('streaming', v);
      }
      if (sendBtnEl) {
        sendBtnEl.className = v ? 'send-btn stop-btn' : 'send-btn';
        sendBtnEl.disabled = false;
      }
      if (sendIcon) sendIcon.style.display = v ? 'none' : 'block';
      if (stopIcon) stopIcon.style.display = v ? 'block' : 'none';

      if (v) {
        paneData.streamStart = Date.now();
        if (inputEl) inputEl.placeholder = 'Claude is responding... 0s';
        if (paneData.streamTimer) clearInterval(paneData.streamTimer);
        const fmt = s => s >= 60 ? `${Math.floor(s/60)}m ${s%60}s` : `${s}s`;
        paneData.streamTimer = setInterval(() => {
          const s = Math.floor((Date.now() - paneData.streamStart) / 1000);
          if (inputEl) inputEl.placeholder = `Claude is responding... ${fmt(s)}`;
        }, 1000);
      } else {
        if (paneData.streamTimer) { clearInterval(paneData.streamTimer); paneData.streamTimer = null; }
        if (inputEl) { inputEl.placeholder = 'Send a message...'; inputEl.focus(); }
      }
    }

    // Route WS messages to split panes
    function handleSplitPaneMessage(msg) {
      if (!msg.sessionId) return false;
      const paneData = splitPanes.find(p => p.sessionId === msg.sessionId);
      if (!paneData) return false;

      const msgsEl = document.getElementById(`${paneData.id}-msgs`);
      if (!msgsEl) return false;

      if (msg.type === 'text') {
        paneData.streamText += msg.text;
        if (!paneData.currentAssistantEl) {
          const div = document.createElement('div');
          div.className = 'message assistant';
          div.innerHTML = '<div class="message-label">Claude</div><div class="message-body"><div class="assistant-text"></div></div>';
          msgsEl.appendChild(div);
          paneData.currentAssistantEl = div;
        }
        const textEl = paneData.currentAssistantEl.querySelector('.assistant-text');
        if (textEl) textEl.innerHTML = marked.parse(paneData.streamText);
        msgsEl.scrollTop = msgsEl.scrollHeight;
        return true;
      }

      if (msg.type === 'tool_use') {
        if (!paneData.currentAssistantEl) {
          const div = document.createElement('div');
          div.className = 'message assistant';
          div.innerHTML = '<div class="message-label">Claude</div><div class="message-body"><div class="tools-zone"></div><div class="assistant-text"></div></div>';
          msgsEl.appendChild(div);
          paneData.currentAssistantEl = div;
        }
        let zone = paneData.currentAssistantEl.querySelector('.tools-zone');
        if (!zone) {
          zone = document.createElement('div'); zone.className = 'tools-zone';
          paneData.currentAssistantEl.querySelector('.message-body').prepend(zone);
        }
        zone.insertAdjacentHTML('beforeend', `<div class="tool-block" id="split-tool-${msg.toolId}"><div class="tool-header" onclick="this.parentElement.classList.toggle('open')"><span class="tool-chevron">&#9654;</span><span class="tool-name">${esc(msg.toolName)}</span><span class="tool-desc">${esc(getToolDesc(msg.toolName,msg.input||{}))}</span><span class="tool-status running">running...</span></div><div class="tool-content"></div></div>`);
        msgsEl.scrollTop = msgsEl.scrollHeight;
        return true;
      }

      if (msg.type === 'tool_result') {
        const tb = document.getElementById(`split-tool-${msg.toolId}`);
        if (tb) {
          const st = tb.querySelector('.tool-status');
          if (st) { st.textContent = msg.isError ? 'error' : 'done'; st.className = 'tool-status ' + (msg.isError ? 'error' : 'done'); }
        }
        return true;
      }

      if (msg.type === 'done' || msg.type === 'stopped' || msg.type === 'process_ended') {
        if (msg.type === 'done' && paneData.streamText === '' && msg.text) {
          paneData.streamText = msg.text;
          if (paneData.currentAssistantEl) {
            const textEl = paneData.currentAssistantEl.querySelector('.assistant-text');
            if (textEl) textEl.innerHTML = marked.parse(paneData.streamText);
          }
        }
        paneData.streamText = '';
        paneData.currentAssistantEl = null;
        setPaneStreaming(paneData.id, false);
        return true;
      }

      if (msg.type === 'error') {
        if (!paneData.currentAssistantEl) {
          const div = document.createElement('div'); div.className = 'message assistant';
          div.innerHTML = `<div class="message-label">Claude</div><div class="message-body"><div style="color:#ef4444;">${esc(msg.text)}</div></div>`;
          msgsEl.appendChild(div);
        } else {
          paneData.currentAssistantEl.querySelector('.message-body').insertAdjacentHTML('beforeend', `<div style="color:#ef4444;">${esc(msg.text)}</div>`);
        }
        setPaneStreaming(paneData.id, false);
        return true;
      }

      return false;
    }

    function removeSplitPane(paneId) {
      const idx = splitPanes.findIndex(p => p.id === paneId);
      if (idx === -1) return;

      const pane = splitPanes[idx];
      pane.el.remove();

      // Remove associated resizer
      const resizer = splitContainer.querySelector(`.split-resizer[data-pane-id="${paneId}"]`);
      if (resizer) resizer.remove();
      if (idx === 0) {
        const firstResizer = splitContainer.querySelector('.split-resizer');
        if (firstResizer) firstResizer.remove();
      }

      splitPanes.splice(idx, 1);

      if (splitPanes.length === 0) {
        mainEl.classList.remove('split-active');
        splitContainer.style.display = 'none';
        splitContainer.innerHTML = '';
      }
    }

    async function loadPaneMessages(paneId, sessionId) {
      const msgsEl = document.getElementById(`${paneId}-msgs`);
      if (!msgsEl) return;
      try {
        const res = await fetch(`/api/sessions/${sessionId}/messages`);
        const msgs = await res.json();
        let html = '';
        for (const m of msgs) {
          if (m.role === 'user') {
            html += `<div class="message user"><div class="message-label"><span class="user-badge">LOB</span></div><div class="message-body">${esc(m.content).replace(/\n/g, '<br>')}</div></div>`;
          } else if (m.role === 'assistant') {
            const tools = m.tool_data ? JSON.parse(m.tool_data) : [];
            const text = m.content ? marked.parse(m.content) : '';
            let toolsHtml = '';
            if (tools.length > 0) {
              const counts = {};
              tools.forEach(t => counts[t.name] = (counts[t.name]||0)+1);
              const detail = Object.entries(counts).map(([k,v])=>`${k} x${v}`).join(', ');
              toolsHtml = `<div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">${tools.length} tools (${detail})</div>`;
            }
            html += `<div class="message assistant"><div class="message-label">Claude</div><div class="message-body">${toolsHtml}<div class="assistant-text">${text}</div></div></div>`;
          }
        }
        msgsEl.innerHTML = html || '<div style="padding:20px;color:var(--text-muted);text-align:center;font-size:13px;">메시지 없음</div>';
        msgsEl.scrollTop = msgsEl.scrollHeight;
      } catch {
        msgsEl.innerHTML = '<div style="padding:20px;color:#ef4444;text-align:center;">로드 실패</div>';
      }
    }

    function initResizer(resizer) {
      let startPos, startSizes, panes, prop;

      resizer.addEventListener('mousedown', (e) => {
        e.preventDefault();
        resizer.classList.add('dragging');
        const isHoriz = splitDirection === 'horizontal';
        prop = isHoriz ? 'width' : 'height';
        startPos = isHoriz ? e.clientX : e.clientY;

        // Get the two adjacent panes
        const prevEl = resizer.previousElementSibling;
        const nextEl = resizer.nextElementSibling;
        if (!prevEl || !nextEl) return;

        const prevRect = prevEl.getBoundingClientRect();
        const nextRect = nextEl.getBoundingClientRect();
        startSizes = [
          isHoriz ? prevRect.width : prevRect.height,
          isHoriz ? nextRect.width : nextRect.height
        ];
        panes = [prevEl, nextEl];

        const onMove = (ev) => {
          const delta = (isHoriz ? ev.clientX : ev.clientY) - startPos;
          const newPrev = Math.max(100, startSizes[0] + delta);
          const newNext = Math.max(100, startSizes[1] - delta);
          panes[0].style.flex = 'none';
          panes[1].style.flex = 'none';
          panes[0].style[prop] = newPrev + 'px';
          panes[1].style[prop] = newNext + 'px';
        };

        const onUp = () => {
          resizer.classList.remove('dragging');
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        };

        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    }

    // ── Init ──
    connect();
    loadSessions();
    inputBox.focus();
  </script>
</body>
</html>
