<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Code Web</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --border: #2e2e2e;
      --text: #e4e4e7; --text-muted: #71717a; --accent: #c084fc; --accent-dim: rgba(192,132,252,0.1);
      --user-bg: #262626; --sidebar-w: 260px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; height: 100vh; display: flex; overflow: hidden; }

    /* Sidebar */
    .sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: width 0.2s ease, min-width 0.2s ease; overflow: hidden; min-width: var(--sidebar-w); }
    .sidebar.collapsed { width: 0; min-width: 0; border-right: none; }
    .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
    .sidebar-toggle { width: 32px; height: 32px; border-radius: 6px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .sidebar-toggle:hover { background: var(--surface2); color: var(--text); }
    .new-chat-btn { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text); font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.15s; }
    .new-chat-btn:hover { background: var(--surface2); }
    .session-list { flex: 1; overflow-y: auto; padding: 8px; }
    .session-list::-webkit-scrollbar { width: 4px; }
    .session-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    /* Session group container — visually groups a root session with its branches */
    .session-group { margin-bottom: 10px; border-radius: 10px; padding: 2px; transition: background 0.15s, box-shadow 0.15s; }
    .session-group.has-children { background: rgba(192,132,252,0.04); border: 1px solid rgba(192,132,252,0.10); }
    .session-group.contains-active { background: rgba(192,132,252,0.08); border-color: rgba(192,132,252,0.25); box-shadow: 0 0 0 1px rgba(192,132,252,0.15); }

    .session-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px; margin-bottom: 2px; transition: background 0.15s, border-color 0.15s; position: relative; border: 1px solid transparent; }
    .session-item:hover { background: var(--surface2); }
    .session-item.active { background: var(--accent-dim); border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 2px 8px rgba(192,132,252,0.25); }
    .session-item.active::before { content: ""; position: absolute; left: 0; top: 6px; bottom: 6px; width: 3px; background: var(--accent); border-radius: 2px; }
    .session-item .name { flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .session-item.active .name { font-weight: 600; color: #fff; }
    .session-item .branch-badge { font-size: 10px; color: var(--accent); background: var(--accent-dim); padding: 1px 5px; border-radius: 4px; font-weight: 600; }
    .session-item .running-dot { font-size: 9px; color: #22c55e; animation: pulse-dot 1.2s ease-in-out infinite; flex-shrink: 0; }
    @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* Storage bar */
    .storage-bar { padding: 10px 12px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .storage-trash-btn { flex: 1; display: flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 12px; cursor: pointer; transition: all 0.15s; text-align: left; white-space: nowrap; overflow: hidden; }
    .storage-trash-btn:hover { background: rgba(239,68,68,0.1); color: #ef4444; border-color: rgba(239,68,68,0.3); }
    .storage-trash-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .storage-trash-icon { font-size: 14px; flex-shrink: 0; }
    .storage-size-label { overflow: hidden; text-overflow: ellipsis; }
    .storage-info-wrap { position: relative; flex-shrink: 0; }
    .storage-info-btn { width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 11px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .storage-info-btn:hover { background: var(--surface2); color: var(--text); }
    .storage-tooltip { display: none; position: absolute; bottom: 30px; right: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; min-width: 220px; font-size: 12px; z-index: 200; box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
    .storage-info-wrap:hover .storage-tooltip { display: block; }
    .storage-tooltip-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .storage-tooltip-item { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .storage-tooltip-item:last-child { border-bottom: none; }
    .storage-tooltip-item.other { border-top: 1px solid var(--border); margin-top: 4px; padding-top: 6px; border-bottom: none; }
    .storage-tooltip-name { color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; max-width: 150px; white-space: nowrap; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
    .storage-tooltip-size { color: var(--text); font-weight: 600; flex-shrink: 0; }
    .session-item .actions { display: none; gap: 4px; }
    .session-item:hover .actions { display: flex; }
    .session-item .actions button { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 13px; padding: 2px 4px; border-radius: 4px; }
    .session-item .actions button:hover { background: var(--surface); color: var(--text); }
    /* Branch tree line */
    .session-branch { position: relative; padding-left: 18px; }
    .session-branch::before { content: ""; position: absolute; left: 8px; top: 0; bottom: 50%; width: 1px; background: rgba(192,132,252,0.35); }
    .session-branch::after { content: ""; position: absolute; left: 8px; top: 50%; width: 8px; height: 1px; background: rgba(192,132,252,0.35); }
    .session-branch.not-last::before { bottom: 0; }
    /* Accordion toggle for branches */
    .branch-toggle { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border: none; background: transparent; color: rgba(192,132,252,0.6); cursor: pointer; font-size: 10px; padding: 0; border-radius: 4px; transition: transform 0.2s, color 0.15s; flex-shrink: 0; }
    .branch-toggle:hover { color: var(--accent); background: rgba(192,132,252,0.1); }
    .branch-toggle.collapsed { transform: rotate(-90deg); }
    .branch-children { overflow: hidden; transition: max-height 0.25s ease, opacity 0.2s ease; max-height: 500px; opacity: 1; }
    .branch-children.collapsed { max-height: 0; opacity: 0; }
    .session-edit { width: 100%; background: var(--bg); border: 1px solid var(--accent); border-radius: 4px; color: var(--text); padding: 4px 8px; font-size: 13px; font-family: inherit; outline: none; }

    /* Pin */
    .pin-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 12px; padding: 2px 4px; border-radius: 4px; opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
    .pin-btn:hover { opacity: 1; color: #facc15; }
    .pin-btn.pinned { opacity: 1; color: #facc15; }
    .session-item:hover .pin-btn { opacity: 0.7; }
    .pinned-divider { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; padding: 6px 12px 2px; font-weight: 600; }

    /* Split view */
    .main.split-active > .messages, .main.split-active > .input-area { display: none !important; }
    .split-container { display: flex; flex: 1; min-width: 0; min-height: 0; overflow: hidden; }
    .split-container.vertical { flex-direction: column; }
    .split-container.horizontal { flex-direction: row; }
    .split-pane { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; position: relative; overflow: hidden; border: 1px solid var(--border); }
    .split-pane .pane-header { display: flex; align-items: center; gap: 6px; padding: 6px 10px; background: var(--surface); border-bottom: 1px solid var(--border); font-size: 12px; flex-shrink: 0; }
    .split-pane .pane-header .pane-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-muted); font-weight: 500; }
    .split-pane .pane-header button { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 13px; padding: 2px 6px; border-radius: 4px; }
    .split-pane .pane-header button:hover { background: var(--surface2); color: var(--text); }
    .split-pane .pane-messages { flex: 1; overflow-y: auto; padding: 16px 0; }
    .split-pane .pane-messages::-webkit-scrollbar { width: 4px; }
    .split-pane .pane-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .split-pane .pane-messages .message { padding: 12px 16px; max-width: 100%; }
    .split-resizer { flex-shrink: 0; background: var(--border); transition: background 0.15s; }
    .split-resizer:hover, .split-resizer.dragging { background: var(--accent); }
    .split-container.horizontal > .split-resizer { width: 4px; cursor: col-resize; }
    .split-container.vertical > .split-resizer { height: 4px; cursor: row-resize; }
    .split-btn-group { display: flex; gap: 2px; margin-left: auto; }
    .split-dir-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; font-size: 11px; padding: 2px 6px; border-radius: 4px; transition: all 0.15s; }
    .split-dir-btn:hover { background: var(--surface2); color: var(--text); }
    .split-dir-btn.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
    .pane-input-area { flex-shrink: 0; border-top: 1px solid var(--border); padding: 10px 16px; background: var(--surface); }
    .pane-input-area .pane-status-bar { display: flex; justify-content: space-between; align-items: center; margin: 0 auto 4px; padding: 0 4px; }
    .pane-input-area .pane-input-wrapper { display: flex; gap: 8px; align-items: flex-end; position: relative; }
    .pane-input-area .input-box { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; resize: none; outline: none; min-height: 48px; max-height: 200px; line-height: 1.5; transition: border-color 0.2s; overflow-y: hidden; }
    .pane-input-area .input-box:focus { border-color: var(--accent); }
    .pane-input-area .input-box::placeholder { color: var(--text-muted); }
    .pane-input-area .input-box.streaming { border-color: var(--accent); background: linear-gradient(90deg, var(--bg) 0%, rgba(255,184,0,0.08) 50%, var(--bg) 100%); background-size: 200% 100%; animation: streamShimmer 1.8s linear infinite; cursor: not-allowed; }
    .pane-input-area .input-box.streaming::placeholder { color: var(--accent); font-style: italic; }
    .pane-input-area .send-btn { width: 48px; height: 48px; border-radius: 12px; border: none; background: var(--accent); color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .pane-input-area .send-btn:hover { opacity: 0.85; }
    .pane-input-area .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .pane-input-area .send-btn svg { width: 20px; height: 20px; }
    .pane-input-area .stop-btn { background: #ef4444; }
    .pane-input-area .attach-btn { width: 40px; height: 40px; border-radius: 10px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: color 0.15s, background 0.15s; }
    .pane-input-area .attach-btn:hover { color: var(--accent); background: var(--accent-dim); }
    .pane-input-area .attach-btn svg { width: 18px; height: 18px; }
    .pane-input-area .pane-attachments { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }

    /* Main */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .header { padding: 12px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 18px; font-weight: 700; color: var(--accent); }
    .header-logo { white-space: nowrap; }
    @media (max-width: 700px) { .header-logo { display: none; } }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: var(--accent-dim); color: var(--accent); font-weight: 500; }
    .header-center { display: flex; align-items: center; gap: 6px; font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--text-muted); flex-wrap: wrap; justify-content: flex-end; }
    .gauge-group { display: flex; align-items: center; gap: 4px; white-space: nowrap; }
    .gauge-label { font-weight: 600; color: #a1a1aa; margin-right: 2px; }
    .gauge-bar { letter-spacing: -1px; font-size: 11px; position: relative; display: inline-flex; align-items: center; border: 1px solid #3f3f46; border-radius: 3px; padding: 1px 2px; line-height: 1; }
    .gauge-bar .filled { color: var(--accent); }
    .gauge-bar .empty { color: #27272a; }
    .gauge-bar .gauge-pct-inner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -40%); font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.9); letter-spacing: 0; pointer-events: none; text-shadow: 0 0 3px rgba(0,0,0,0.9); line-height: 1; }
    .gauge-time { font-size: 11px; color: #52525b; }
    .gauge-sep { color: #3f3f46; margin: 0 6px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #ef4444; }
    .status-dot.connected { background: #22c55e; }

    .messages { flex: 1; overflow-y: auto; padding: 24px 0; scroll-behavior: smooth; display: flex; flex-direction: column; }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .message { padding: 20px 24px; max-width: 900px; margin: 0 auto; width: 100%; }
    .message.user { background: var(--user-bg); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .message-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
    .message.assistant .message-label { color: var(--accent); }
    .msg-restart-btn { margin-left: auto; padding: 2px 8px; font-size: 11px; background: transparent; color: var(--text-muted); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; opacity: 0; transition: opacity 0.15s; font-family: inherit; }
    .message.user:hover .msg-restart-btn { opacity: 1; }
    .msg-restart-btn:hover { color: var(--accent); border-color: var(--accent); }
    .msg-edit-area { width: 100%; min-height: 60px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 8px; font-family: inherit; font-size: inherit; resize: vertical; box-sizing: border-box; }
    .msg-edit-actions { display: flex; gap: 8px; margin-top: 8px; }
    .msg-edit-actions button { padding: 4px 12px; font-size: 12px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer; font-family: inherit; }
    .msg-edit-actions .msg-edit-save { background: var(--accent); color: #fff; border-color: var(--accent); }
    .msg-edit-actions button:hover { opacity: 0.85; }
    .user-badge { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 6px; background: var(--accent); color: #000; font-size: 10px; font-weight: 700; letter-spacing: 0; }
    .msg-time { font-weight: 400; color: #52525b; font-size: 11px; letter-spacing: 0; text-transform: none; }

    /* Tool summary */
    .tools-summary { margin: 8px 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .tools-summary-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--surface2); cursor: pointer; font-size: 13px; color: var(--text-muted); user-select: none; }
    .tools-summary-header:hover { background: #2a2a2a; }
    .tools-summary-header .ts-chevron { font-size: 10px; color: var(--text-muted); transition: transform 0.2s; }
    .tools-summary.open .ts-chevron { transform: rotate(90deg); }
    .tools-summary-header .ts-count { color: var(--accent); font-weight: 600; }
    .tools-summary-header .ts-detail { color: #52525b; font-size: 12px; }
    .tools-summary-body { display: none; padding: 4px; background: var(--surface); border-top: 1px solid var(--border); max-height: 400px; overflow-y: auto; }
    .tools-summary.open .tools-summary-body { display: block; }
    .message-body { font-size: 15px; line-height: 1.7; word-break: break-word; }
    .message-body p { margin-bottom: 12px; } .message-body p:last-child { margin-bottom: 0; }
    .message-body code { font-family: 'JetBrains Mono', monospace; font-size: 13px; background: var(--surface2); padding: 2px 6px; border-radius: 4px; }
    .message-body pre { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin: 12px 0; overflow-x: auto; }
    .message-body pre code { background: none; padding: 0; font-size: 13px; line-height: 1.5; }
    .message-body ul, .message-body ol { margin: 8px 0; padding-left: 24px; }
    .message-body li { margin-bottom: 4px; }
    .message-body h1,.message-body h2,.message-body h3 { margin: 16px 0 8px; font-weight: 600; }
    .message-body blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text-muted); margin: 8px 0; }
    .message-body a { color: var(--accent); }
    .message-body table { border-collapse: collapse; margin: 12px 0; width: 100%; }
    .message-body th,.message-body td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; font-size: 14px; }
    .message-body th { background: var(--surface2); font-weight: 600; }
    .message-meta { margin-top: 12px; font-size: 11px; color: var(--text-muted); }

    .tool-block { margin: 8px 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; font-size: 13px; }
    .tool-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--surface2); cursor: pointer; }
    .tool-header:hover { background: #2a2a2a; }
    .tool-name { font-weight: 600; color: var(--accent); font-family: 'JetBrains Mono', monospace; font-size: 12px; }
    .tool-desc { color: var(--text-muted); font-size: 12px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tool-status { font-size: 11px; }
    .tool-status.running { color: #f59e0b; } .tool-status.done { color: #22c55e; } .tool-status.error { color: #ef4444; }
    .tool-chevron { color: var(--text-muted); transition: transform 0.2s; font-size: 10px; }
    .tool-block.open .tool-chevron { transform: rotate(90deg); }
    .tool-content { display: none; padding: 0; background: var(--surface); border-top: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.6; max-height: 400px; overflow: auto; }
    .tool-block.open .tool-content { display: block; }
    .tool-file { padding: 6px 12px; background: #1e1e2e; color: #89b4fa; font-size: 11px; border-bottom: 1px solid var(--border); }
    .tool-diff { padding: 0; }
    .tool-diff-line { padding: 2px 12px; white-space: pre-wrap; word-break: break-all; }
    .tool-diff-line.removed { background: rgba(239,68,68,0.15); color: #fca5a5; }
    .tool-diff-line.added { background: rgba(34,197,94,0.15); color: #86efac; }
    .tool-diff-line.info { color: #52525b; font-style: italic; padding: 6px 12px; }
    .tool-bash-cmd { padding: 8px 12px; background: #1e1e2e; color: #a6e3a1; border-bottom: 1px solid var(--border); }
    .tool-bash-cmd::before { content: "$ "; color: #52525b; }
    .tool-bash-output { padding: 8px 12px; white-space: pre-wrap; word-break: break-all; color: var(--text-muted); }
    .tool-read-content { padding: 8px 12px; white-space: pre-wrap; word-break: break-all; color: var(--text); }
    .tool-json { padding: 8px 12px; white-space: pre-wrap; word-break: break-all; color: var(--text-muted); }

    .typing { display: inline-flex; gap: 4px; padding: 4px 0; }
    .typing span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: bounce 1.4s ease-in-out infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .server-toggle { cursor: pointer; display: inline-flex; align-items: center; padding: 2px 4px; border-radius: 4px; transition: color 0.2s, background 0.15s; }
    .server-toggle.on { color: #22c55e; }
    .server-toggle.off { color: #ef4444; }
    .server-toggle.restarting { color: #f59e0b; animation: spin 1s linear infinite; }
    .server-toggle:hover { background: var(--surface2); }
    .gauge-updated { transition: opacity 0.2s; }
    .gauge-updated:hover { opacity: 1 !important; }
    .gauge-updated:hover #refreshIcon { opacity: 1 !important; }

    .input-area { flex-shrink: 0; border-top: 1px solid var(--border); padding: 16px 24px; background: var(--surface); }
    .input-wrapper { max-width: 900px; margin: 0 auto; display: flex; gap: 12px; align-items: flex-end; position: relative; }
    .input-box { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; resize: none; outline: none; min-height: 48px; max-height: 200px; line-height: 1.5; transition: border-color 0.2s; overflow-y: hidden; }
    .input-box:focus { border-color: var(--accent); }
    .input-box::placeholder { color: var(--text-muted); }
    .message.user .message-body.collapsible { position: relative; }

    .message.user .message-body.collapsible:not(.collapsed) .msg-preview { display: none; }
    .msg-toggle { display: inline-block; margin-top: 8px; padding: 4px 10px; font-size: 12px; background: transparent; color: var(--accent); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-family: inherit; }
    .msg-toggle:hover { border-color: var(--accent); }
    .input-box.streaming { border-color: var(--accent); background: linear-gradient(90deg, var(--bg) 0%, rgba(255,184,0,0.08) 50%, var(--bg) 100%); background-size: 200% 100%; animation: streamShimmer 1.8s linear infinite; cursor: not-allowed; }
    .input-box.streaming::placeholder { color: var(--accent); font-style: italic; }
    @keyframes streamShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .send-btn { width: 48px; height: 48px; border-radius: 12px; border: none; background: var(--accent); color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .status-bar { display: flex; justify-content: space-between; align-items: center; max-width: 900px; margin: 0 auto 4px; padding: 0 12px 0 116px; }
    .perm-indicator { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: #52525b; cursor: pointer; transition: color 0.15s; }
    .perm-indicator:hover { color: var(--text-muted); }
    .status-right { display: flex; align-items: center; gap: 6px; font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text-muted); }
    .model-select { cursor: pointer; padding: 2px 6px; border-radius: 4px; transition: background 0.15s, color 0.15s; }
    .model-select:hover { background: var(--surface2); }
    .model-select.expensive { color: #ef4444; }
    .model-select.normal { color: var(--text-muted); }
    .perm-indicator:hover { color: var(--text-muted); }
    .attach-btn { width: 40px; height: 40px; border-radius: 10px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: color 0.15s, background 0.15s; }
    .attach-btn:hover { color: var(--accent); background: var(--accent-dim); }
    .attach-btn svg { width: 18px; height: 18px; }
    .perm-btn svg { width: 16px; height: 16px; }
    .send-btn:hover { opacity: 0.85; } .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .send-btn svg { width: 20px; height: 20px; }
    .stop-btn { background: #ef4444; }

    /* Attachments */
    .attachments { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; max-width: 900px; margin-left: auto; margin-right: auto; }
    .attach-item { position: relative; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--surface2); display: flex; align-items: center; gap: 8px; padding-right: 8px; }
    .attach-thumb { width: 48px; height: 48px; object-fit: cover; }
    .attach-file-icon { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; background: var(--surface); font-size: 20px; }
    .attach-name { font-size: 12px; color: var(--text-muted); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .attach-remove { position: absolute; top: 2px; right: 2px; width: 18px; height: 18px; border-radius: 50%; background: rgba(0,0,0,0.7); color: #fff; border: none; cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; }
    .attach-remove:hover { background: #ef4444; }
    .input-area.dragover { border-top: 2px solid var(--accent); background: var(--accent-dim); }
    .input-area.dragover .input-box { border-color: var(--accent); }

    /* CWD picker */
    .cwd-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
    .cwd-modal.open { display: flex; }
    /* Custom confirm modal */
    .confirm-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center; animation: fade-in 0.15s ease; }
    .confirm-modal.open { display: flex; }
    .confirm-dialog { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 420px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(192,132,252,0.1); animation: pop-in 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .confirm-icon { width: 48px; height: 48px; border-radius: 50%; background: rgba(239, 68, 68, 0.12); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 24px; }
    .confirm-title { font-size: 17px; font-weight: 600; text-align: center; color: var(--text); margin-bottom: 8px; }
    .confirm-message { font-size: 14px; text-align: center; color: var(--text-muted); line-height: 1.5; margin-bottom: 24px; }
    .confirm-actions { display: flex; gap: 10px; }
    .confirm-btn { flex: 1; padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; font-family: inherit; }
    .confirm-btn:hover { background: var(--bg); border-color: var(--text-muted); }
    .confirm-btn.danger { background: #ef4444; border-color: #ef4444; color: #fff; }
    .confirm-btn.danger:hover { background: #dc2626; border-color: #dc2626; }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pop-in { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .cwd-dialog { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 480px; max-width: 90vw; }
    .cwd-dialog h3 { font-size: 16px; margin-bottom: 12px; color: var(--text); }
    .cwd-breadcrumb { display: flex; align-items: center; gap: 2px; margin-bottom: 12px; flex-wrap: wrap; }
    .cwd-crumb { padding: 3px 6px; border-radius: 4px; background: transparent; border: none; color: var(--accent); font-size: 13px; cursor: pointer; font-family: 'JetBrains Mono', monospace; }
    .cwd-crumb:hover { background: var(--accent-dim); }
    .cwd-crumb-sep { color: var(--text-muted); font-size: 12px; }
    .cwd-dir-list { max-height: 300px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); margin-bottom: 12px; }
    .cwd-dir-list::-webkit-scrollbar { width: 4px; }
    .cwd-dir-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .cwd-dir-item { padding: 8px 12px; cursor: pointer; font-size: 13px; font-family: 'JetBrains Mono', monospace; color: var(--text); display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); }
    .cwd-dir-item:last-child { border-bottom: none; }
    .cwd-dir-item:hover { background: var(--surface2); }
    .cwd-dir-icon { color: var(--accent); font-size: 14px; }
    .cwd-current { padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; font-family: 'JetBrains Mono', monospace; color: var(--text-muted); margin-bottom: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cwd-drives { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .cwd-drive-btn { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text); font-size: 13px; font-family: 'JetBrains Mono', monospace; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
    .cwd-drive-btn:hover { background: var(--accent-dim); border-color: var(--accent); }
    .cwd-drive-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); font-weight: 600; }
    .cwd-buttons { display: flex; gap: 8px; justify-content: flex-end; }
    .cwd-buttons button { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; }
    .cwd-btn-cancel { background: var(--surface2); color: var(--text-muted); }
    .cwd-btn-ok { background: var(--accent); color: #000; font-weight: 600; }
    .perm-section { margin-bottom: 12px; }
    .perm-label { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
    .perm-options { display: flex; gap: 8px; }
    .perm-opt { flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; background: transparent; cursor: pointer; text-align: left; }
    .perm-opt:hover { border-color: #52525b; }
    .perm-opt.selected { border-color: var(--accent); background: var(--accent-dim); }
    .perm-opt-name { font-size: 13px; font-weight: 600; color: var(--text); display: block; }
    .perm-opt-desc { font-size: 11px; color: var(--text-muted); display: block; margin-top: 2px; }

    .slash-menu { display: none; position: absolute; bottom: 100%; left: 0; right: 60px; margin-bottom: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: 0 -4px 20px rgba(0,0,0,0.4); }
    .slash-menu.open { display: block; }
    .slash-item { padding: 10px 16px; cursor: pointer; display: flex; gap: 12px; transition: background 0.1s; }
    .slash-item:hover,.slash-item.active { background: var(--surface2); }
    .slash-item-name { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; color: var(--accent); }
    .slash-item-desc { font-size: 13px; color: var(--text-muted); }

    .welcome { display: flex; align-items: center; justify-content: center; height: 100%; }
    .welcome-content { text-align: center; max-width: 700px; padding: 24px; }
    .welcome-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; color: var(--accent); letter-spacing: 1px; }
    .welcome-desc { color: var(--text-muted); font-size: 15px; }
    /* Buddy row — exact ASCII from Claude Code CLI */
    .buddy-row { display: flex; justify-content: center; align-items: flex-end; gap: 40px; margin-bottom: 24px; }
    .buddy { font-family: 'JetBrains Mono', monospace; font-size: 14px; line-height: 1.1; white-space: pre; text-align: left; }
    .buddy.capybara { color: #d4a574; text-shadow: 0 0 8px rgba(212, 165, 116, 0.3); }
    .buddy.owl      { color: #a78bfa; text-shadow: 0 0 8px rgba(167, 139, 250, 0.3); }
    .buddy.cat      { color: #f472b6; text-shadow: 0 0 8px rgba(244, 114, 182, 0.3); }
  </style>
</head>
<body>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" onclick="createSession()">+ New Chat</button>
    </div>

    <div class="storage-bar" id="storageBar">
      <button class="storage-trash-btn" id="storageTrashBtn" title="사용하지 않는 Claude 세션 파일 삭제">

      </button>
      <div class="storage-info-wrap">
        <button class="storage-info-btn" title="세션 파일 용량 상세">!</button>

          <div class="storage-tooltip-title">Claude 세션 파일</div>

  <div class="main">
    <div class="header">

        <span class="logo header-logo">Claude Code Web</span>
      </div>
      <div class="header-center">
        <span class="gauge-group"><span class="gauge-label">S:</span><span class="gauge-bar" id="barS"></span><span class="gauge-time" id="timeS"></span></span>
        <span class="gauge-sep">|</span>
        <span class="gauge-group"><span class="gauge-label">W:</span><span class="gauge-bar" id="barW"></span><span class="gauge-time" id="timeW"></span></span>
        <span class="gauge-sep">|</span>
        <span class="gauge-group"><span class="gauge-label">M:</span><span class="gauge-bar" id="barM"></span><span class="gauge-time" id="timeM"></span></span>
        <span class="gauge-sep">|</span>
        <span class="gauge-group gauge-updated" id="lastUpdatedGroup" style="cursor:pointer;" title="클릭하여 수동 새로고침"><span class="gauge-time" id="lastUpdated">-</span><span id="refreshIcon" style="margin-left:3px;font-size:10px;opacity:0.5;">&#x21bb;</span></span>
        <span class="gauge-sep">|</span>
        <span id="serverToggle" class="server-toggle on" title="서버 재시작" onclick="restartServer()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6"/><circle cx="12" cy="14" r="8" fill="none"/><path d="M12 6v4"/></svg>
        </span>

    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-content">
          <div class="buddy-row">
            <div class="buddy owl" id="buddyOwl"></div>
            <div class="buddy capybara" id="buddyCapy"></div>
            <div class="buddy cat" id="buddyCat"></div>
          </div>
          <div class="welcome-title">Claude Code Web</div>
          <div class="welcome-desc">Select a chat or create a new one.</div>
        </div>
      </div>
    </div>

    <div class="split-container horizontal" id="splitContainer" style="display:none;"></div>

    <div class="input-area" id="inputArea" style="display:none;">
      <div class="attachments" id="attachments"></div>
      <div class="status-bar" id="statusBar2">
        <span class="perm-indicator" id="permIndicator" onclick="cyclePermMode()">acceptEdits</span>
        <span class="status-right"><span class="model-select" id="modelSelect" onclick="cycleModel()">sonnet</span> <span class="status-dot" id="statusDot"></span></span>
      </div>
      <div class="input-wrapper">
        <div class="slash-menu" id="slashMenu"></div>
        <input type="file" id="fileInput" multiple hidden />
        <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Attach file">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <button class="attach-btn perm-btn" id="permBtn" onclick="cyclePermMode()" title="Permission mode">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </button>
        <textarea class="input-box" id="inputBox" placeholder="Send a message..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn" disabled>
          <svg id="sendIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>

  <!-- CWD picker modal -->
  <div class="cwd-modal" id="cwdModal">
    <div class="cwd-dialog">
      <h3>Working Directory</h3>

  <!-- Custom confirm modal -->
  <div class="confirm-modal" id="confirmModal">
    <div class="confirm-dialog">
      <div class="confirm-icon" id="confirmIcon">⚠️</div>
      <div class="confirm-title" id="confirmTitle">확인</div>

      <div class="confirm-actions">
        <button class="confirm-btn" id="confirmCancel">취소</button>
        <button class="confirm-btn danger" id="confirmOk">삭제</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script>
    marked.setOptions({ breaks: true, gfm: true });

    const messagesEl = document.getElementById("messages");
    const welcomeEl = document.getElementById("welcome");
    const inputBox = document.getElementById("inputBox");
    const sendBtn = document.getElementById("sendBtn");
    const sendIcon = document.getElementById("sendIcon");
    const stopIcon = document.getElementById("stopIcon");
    const statusDot = document.getElementById("statusDot");
    const sessionListEl = document.getElementById("sessionList");
    const slashMenu = document.getElementById("slashMenu");

    let ws, isStreaming = false, streamText = "", currentAssistantEl = null, currentAssistantBody = null, toolBlocks = {};
    let currentSessionId = null, webSessionActive = true, slashActive = -1;
    let runningSessionIds = new Set(); // 백그라운드 포함 현재 실행 중인 세션 ID 집합

    const slashCommands = [
      { name: "/clear", desc: "Clear chat and start new session" },
      { name: "/branch", desc: "Branch current conversation" },
      { name: "/help", desc: "Show available commands" },
    ];

    // ── Gauge ──
    function renderGauge(pct, w=10) { let h=""; const f=Math.round(pct*w/100); for(let i=0;i<f;i++)h+='<span class="filled">\u2588</span>'; for(let i=0;i<w-f;i++)h+='<span class="empty">\u2591</span>'; h+=`<span class="gauge-pct-inner">${Math.round(pct)}%</span>`; return h; }
    function formatRemaining(r) { if(!r)return""; const d=Math.max(0,r-Math.floor(Date.now()/1000)); if(d<=0)return"now"; const dd=Math.floor(d/86400),hh=Math.floor(d%86400/3600),mm=Math.floor(d%3600/60); return dd>0?`${dd}d${hh}h`:hh>0?`${hh}h${mm}m`:`${mm}m`; }
    function formatResetKo(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      const now = new Date();
      const diff = d - now;
      if (diff <= 0) return "now";
      const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000);
      // Within 24h: "3시간 34분"
      if (diff < 86400000) { return h > 0 ? `${h}시간 ${m}분` : `${m}분`; }
      // Beyond 24h: "(금) 오후 1:00" style
      const days = ["일","월","화","수","목","금","토"];
      const day = days[d.getDay()];
      const hr = d.getHours();
      const ampm = hr < 12 ? "오전" : "오후";
      const hr12 = hr % 12 || 12;
      const min = d.getMinutes().toString().padStart(2,"0");
      return `(${day}) ${ampm} ${hr12}:${min}`;
    }
    function formatAgo(ts) {
      if (!ts) return "-";
      const sec = Math.floor((Date.now() - ts) / 1000);
      if (sec < 60) return "방금";
      const m = Math.floor(sec / 60);
      if (m < 60) return `${m}분 전`;
      const h = Math.floor(m / 60);
      return `${h}시간 전`;
    }
    function updateGauge(id,pct) { document.getElementById("bar"+id).innerHTML=renderGauge(pct); }
    async function pollStatus() { try { const r=await fetch("/api/status"); const d=await r.json(); if(d.s?.pct!=null){updateGauge("S",d.s.pct);document.getElementById("timeS").textContent=d.s.resetsAtIso?formatResetKo(d.s.resetsAtIso):formatRemaining(d.s.resetsAt);} if(d.w?.pct!=null){updateGauge("W",d.w.pct);document.getElementById("timeW").textContent=d.w.resetsAtIso?formatResetKo(d.w.resetsAtIso):formatRemaining(d.w.resetsAt);} if(d.m?.pct!=null){updateGauge("M",d.m.pct);document.getElementById("timeM").textContent=d.m.resetsAtIso?formatResetKo(d.m.resetsAtIso):"";} document.getElementById("lastUpdated").textContent=formatAgo(d.lastUpdated); }catch{} }
    setInterval(pollStatus,5000); pollStatus();
    // "마지막 업데이트" 시간 표시 매분 갱신
    setInterval(()=>{ const el=document.getElementById("lastUpdated"); if(el.dataset.ts) el.textContent=formatAgo(Number(el.dataset.ts)); },30000);
    // 수동 새로고침 버튼
    document.getElementById("lastUpdatedGroup").addEventListener("click", async ()=>{
      const icon=document.getElementById("refreshIcon"); icon.style.opacity="1"; icon.style.animation="spin 0.8s linear";
      try { const r=await fetch("/api/usage-refresh",{method:"POST"}); const d=await r.json(); if(d.s?.pct!=null)updateGauge("S",d.s.pct); if(d.w?.pct!=null)updateGauge("W",d.w.pct); if(d.m?.pct!=null){updateGauge("M",d.m.pct);if(d.m.resetsAtIso)document.getElementById("timeM").textContent=formatResetKo(d.m.resetsAtIso);} if(d.s?.resetsAtIso)document.getElementById("timeS").textContent=formatResetKo(d.s.resetsAtIso); if(d.w?.resetsAtIso)document.getElementById("timeW").textContent=formatResetKo(d.w.resetsAtIso); document.getElementById("lastUpdated").textContent=formatAgo(d.lastUpdated); } catch{} finally { setTimeout(()=>{icon.style.opacity="0.5";icon.style.animation="";},800); }
    });
    document.getElementById("barS").innerHTML=renderGauge(0); document.getElementById("barW").innerHTML=renderGauge(0); document.getElementById("barM").innerHTML=renderGauge(0);

    // ── Sessions ──
    const collapsedBranches = new Set();
    let allSessionsCache = [];

    function toggleBranch(id) {
      if (collapsedBranches.has(id)) collapsedBranches.delete(id);
      else collapsedBranches.add(id);
      const btn = document.querySelector(`.session-item[data-id="${id}"] .branch-toggle`);
      const children = document.querySelector(`.branch-children[data-parent="${id}"]`);
      if (btn) btn.classList.toggle('collapsed');
      if (children) children.classList.toggle('collapsed');
    }

    async function togglePin(id) {
      const s = allSessionsCache.find(x => x.id === id);
      if (!s) return;
      const newVal = s.pinned ? 0 : 1;
      await fetch(`/api/sessions/${id}`, { method: "PATCH", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ pinned: newVal }) });
      loadSessions();
    }

    function openInSplit(id) {
      addSplitPane(id);
    }

    async function loadSessions() {
      const res = await fetch("/api/sessions");
      const sessions = await res.json();
      allSessionsCache = sessions;
      // Build a tree: group children under their parents so branches sit
      // visually under (and indented from) their source session.
      const byId = {}; sessions.forEach(s => { byId[s.id] = s; s._children = []; });

      // Collect pinned branches (children that are pinned) — they'll be extracted
      const pinnedBranchIds = new Set();
      sessions.forEach(s => { if (s.pinned && s.parent_id && byId[s.parent_id]) pinnedBranchIds.add(s.id); });

      const roots = [];
      sessions.forEach(s => {
        // Pinned branches are extracted from the tree — don't add as children
        if (pinnedBranchIds.has(s.id)) return;
        if (s.parent_id && byId[s.parent_id]) byId[s.parent_id]._children.push(s);
        else roots.push(s);
      });

      // All pinned items: pinned roots + pinned branches (shown as standalone)
      const pinnedItems = sessions.filter(s => s.pinned);
      const unpinnedRoots = roots.filter(r => !r.pinned);

      // Check if any descendant matches currentSessionId
      const containsActive = (s) => {
        if (s.id === currentSessionId) return true;
        return s._children.some(containsActive);
      };
      const renderItem = (s, depth, isLast) => {
        const shortCwd = (s.cwd||"~").replace(serverHome,"~").replace(serverHome.replace(/\\/g,"/"),"~");
        const wrapperCls = depth > 0 ? `session-branch${isLast ? '' : ' not-last'}` : '';
        const isRunning = runningSessionIds.has(s.id);
        const kids = s._children;
        const hasKids = kids.length > 0;
        const isCollapsed = collapsedBranches.has(s.id);
        let html = `<div class="${wrapperCls}">
          <div class="session-item${s.id===currentSessionId?' active':''}" data-id="${s.id}" onclick="switchSession('${s.id}')">
            ${hasKids ? `<button class="branch-toggle${isCollapsed ? ' collapsed' : ''}" title="Toggle branches" onclick="event.stopPropagation();toggleBranch('${s.id}')">▼</button>` : ''}
            <button class="pin-btn${s.pinned ? ' pinned' : ''}" title="${s.pinned ? 'Unpin' : 'Pin'}" onclick="event.stopPropagation();togglePin('${s.id}')">&#9733;</button>
            ${s.parent_id ? '<span class="branch-badge" title="branch">b</span>' : ''}
            ${isRunning ? '<span class="running-dot" title="실행 중">●</span>' : ''}
            <span class="name">${esc(s.name)}<br><span style="font-size:10px;color:#52525b;">${esc(shortCwd)}</span></span>
            <span class="actions">
              <button title="Split View" onclick="event.stopPropagation();openInSplit('${s.id}')">⧉</button>
              <button title="Rename" onclick="event.stopPropagation();renameSession('${s.id}',this)">R</button>
              <button title="Branch" onclick="event.stopPropagation();branchSession('${s.id}')">B</button>
              <button title="Delete" onclick="event.stopPropagation();deleteSession('${s.id}')">X</button>
            </span>
          </div>`;
        if (hasKids) {
          html += `<div class="branch-children${isCollapsed ? ' collapsed' : ''}" data-parent="${s.id}">`;
          html += kids.map((c, i) => renderItem(c, depth + 1, i === kids.length - 1)).join("");
          html += `</div>`;
        }
        html += `</div>`;
        return html;
      };
      const renderGroup = (r) => {
        const hasKids = r._children.length > 0;
        const active = containsActive(r);
        const groupCls = `session-group${hasKids ? ' has-children' : ''}${active ? ' contains-active' : ''}`;
        return `<div class="${groupCls}">${renderItem(r, 0, true)}</div>`;
      };
      let html = '';
      if (pinnedItems.length > 0) {
        html += '<div class="pinned-divider">📌 고정됨</div>';
        html += pinnedItems.map(s => renderGroup(s)).join("");
        if (unpinnedRoots.length > 0) html += '<div class="pinned-divider" style="margin-top:8px;">채팅</div>';
      }
      html += unpinnedRoots.map(r => renderGroup(r)).join("");
      sessionListEl.innerHTML = html;
    }

    let pendingCwd = null;
    let pendingPermMode = "acceptEdits";
    let cwdBrowsePath = "";
    let serverHome = "";
    let serverIsWin = false;

    fetch("/api/home").then(r=>r.json()).then(d => { serverHome = d.home; cwdBrowsePath = d.home; serverIsWin = d.isWin || false; });
    fetch("/api/drives").then(r=>r.json()).then(d => { serverDrives = d.drives || []; });

    function createSession() {

    function renderDrives(currentPath) {
      const el = document.getElementById("cwdDrives");
      if (!serverIsWin || serverDrives.length === 0) { el.style.display = "none"; return; }
      el.style.display = "flex";
      const currentDrive = currentPath.substring(0, 3).toUpperCase();
      el.innerHTML = serverDrives.map(d => {
        const active = d.toUpperCase() === currentDrive ? " active" : "";
        const escaped = d.replace(/\\/g, "\\\\");
        return `<button class="cwd-drive-btn${active}" onclick="loadDirList('${escaped}')">${d.substring(0,2)}</button>`;
      }).join("");
    }

    const isWinPath = (p) => /^[A-Za-z]:/.test(p);
    const pathSep = (p) => isWinPath(p) ? "\\" : "/";
    function joinPath(base, child) {
      const sep = pathSep(base);
      if (base.endsWith(sep) || base === "/") return base + child;
      return base + sep + child;
    }

    async function loadDirList(dirPath) {
      cwdBrowsePath = dirPath;
      document.getElementById("cwdCurrent").textContent = dirPath;
      renderDrives(dirPath);

      // Breadcrumb — handle both Windows (C:\foo\bar) and Unix (/foo/bar)
      let bc = "";
      if (isWinPath(dirPath)) {
        const parts = dirPath.split("\\").filter(Boolean);
        const root = parts[0]; // e.g. "C:"
        bc = `<button class="cwd-crumb" onclick="loadDirList('${root}\\\\')">${root}\\</button>`;
        let cumulative = root;
        for (let i = 1; i < parts.length; i++) {
          cumulative += "\\" + parts[i];
          const full = cumulative.replace(/\\/g, "\\\\");
          bc += `<span class="cwd-crumb-sep">\\</span><button class="cwd-crumb" onclick="loadDirList('${full}')">${parts[i]}</button>`;
        }
      } else {
        const parts = dirPath.split("/").filter(Boolean);
        bc = '<button class="cwd-crumb" onclick="loadDirList(\'/\')">/</button>';
        let cumulative = "";
        for (const p of parts) {
          cumulative += "/" + p;
          const full = cumulative;
          bc += `<span class="cwd-crumb-sep">/</span><button class="cwd-crumb" onclick="loadDirList('${full}')">${p}</button>`;
        }
      }
      document.getElementById("cwdBreadcrumb").innerHTML = bc;

      // Dir list
      try {
        const res = await fetch("/api/dirs?path=" + encodeURIComponent(dirPath));
        const data = await res.json();
        const listEl = document.getElementById("cwdDirList");
        if (data.dirs.length === 0) {
          listEl.innerHTML = '<div class="cwd-dir-item" style="color:var(--text-muted);cursor:default;">No subdirectories</div>';
        } else {
          listEl.innerHTML = data.dirs.map(d => {
            const childPath = joinPath(data.path || dirPath, d).replace(/\\/g, "\\\\");
            return `<div class="cwd-dir-item" onclick="loadDirList('${childPath}')"><span class="cwd-dir-icon">&#128193;</span>${d}</div>`;
          }).join("");
        }
      } catch {
        document.getElementById("cwdDirList").innerHTML = '<div class="cwd-dir-item" style="color:#ef4444;">Error reading directory</div>';
      }
    }
